<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bedtime Stories — Stories & Words</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..700&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --night-deep:#171534;
    --night-mid:#221f4a;
    --plum:#332a5e;
    --parchment:#f6ecd8;
    --parchment-edge:#e9d9b8;
    --gold:#e3b15e;
    --gold-soft:#f1cf8f;
    --cream:#f4efe6;
    --ink:#2a2440;
    --coral:#e3876a;
    --mist:rgba(244,239,230,0.55);
    --radius:18px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(circle at 18% 8%, rgba(241,207,143,0.16), transparent 45%),
      radial-gradient(circle at 85% 75%, rgba(227,135,106,0.10), transparent 50%),
      linear-gradient(180deg, var(--night-deep) 0%, var(--night-mid) 55%, var(--plum) 100%);
    font-family:'Quicksand', sans-serif;
    color:var(--cream);
    -webkit-font-smoothing:antialiased;
  }
  .stars{position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden;}
  .star{position:absolute; width:3px; height:3px; background:var(--gold-soft); border-radius:50%; opacity:0.5; animation:twinkle 4s ease-in-out infinite;}
  @keyframes twinkle{0%,100%{opacity:0.15;}50%{opacity:0.85;}}
  @media (prefers-reduced-motion: reduce){ .star{animation:none; opacity:0.4;} }

  .wrap{position:relative; z-index:1; max-width:760px; margin:0 auto; padding:36px 22px 70px;}

  .hero{text-align:center; margin-bottom:34px;}
  .moon{
    width:64px; height:64px; margin:0 auto 14px; border-radius:50%;
    background: radial-gradient(circle at 35% 35%, var(--gold-soft), var(--gold) 60%, #c98f3f 100%);
    box-shadow:0 0 30px 6px rgba(227,177,94,0.45), 0 0 70px 18px rgba(227,177,94,0.12);
  }
  h1{
    font-family:'Fraunces', serif; font-weight:600; font-size:2.3rem; margin:0 0 6px;
    letter-spacing:0.01em;
  }
  .tagline{color:var(--mist); font-size:0.98rem; margin:0; font-weight:500;}

  .lanterns{
    display:grid; grid-template-columns:repeat(3, 1fr); gap:12px; margin-bottom:30px;
  }
  @media (max-width:520px){ .lanterns{grid-template-columns:repeat(2,1fr);} }
  .lantern{
    background:rgba(244,239,230,0.06);
    border:1px solid rgba(244,239,230,0.16);
    border-radius:14px; padding:16px 10px;
    text-align:center; cursor:pointer;
    transition:transform 0.18s ease, background 0.18s ease, border-color 0.18s ease;
    font-family:'Quicksand', sans-serif; font-weight:600; color:var(--cream);
  }
  .lantern .emoji{display:block; font-size:1.6rem; margin-bottom:6px;}
  .lantern:hover{transform:translateY(-3px); background:rgba(244,239,230,0.12);}
  .lantern.active{
    background:linear-gradient(160deg, rgba(227,177,94,0.28), rgba(227,177,94,0.10));
    border-color:var(--gold-soft);
    box-shadow:0 0 22px rgba(227,177,94,0.25);
  }

  .shelf-label{
    font-family:'Fraunces', serif; font-size:1.1rem; color:var(--gold-soft);
    margin:0 0 14px; text-align:center; font-weight:500;
  }

  .shelf{display:grid; gap:14px;}
  .book{
    background:linear-gradient(160deg, rgba(244,239,230,0.08), rgba(244,239,230,0.03));
    border:1px solid rgba(244,239,230,0.14);
    border-radius:14px; padding:16px 18px; cursor:pointer;
    display:flex; align-items:center; gap:14px;
    transition:background 0.18s ease, transform 0.18s ease;
  }
  .book:hover{background:rgba(244,239,230,0.13); transform:translateX(3px);}
  .book .ic{font-size:1.7rem;}
  .book .meta{flex:1;}
  .book .b-title{font-family:'Fraunces', serif; font-size:1.12rem; margin:0 0 3px; color:var(--cream);}
  .book .b-sub{font-size:0.8rem; color:var(--mist); margin:0;}
  .book .arrow{color:var(--gold-soft); font-size:1.1rem;}

  /* Story reading view */
  .page-overlay{
    position:fixed; inset:0; z-index:5; background:rgba(20,18,40,0.55);
    display:flex; align-items:flex-start; justify-content:center;
    padding:30px 16px; overflow-y:auto;
    backdrop-filter: blur(2px);
  }
  .page{
    background:linear-gradient(170deg, var(--parchment), var(--parchment-edge));
    color:var(--ink); border-radius:var(--radius);
    max-width:600px; width:100%; padding:32px 28px 28px;
    box-shadow:0 20px 60px rgba(0,0,0,0.4);
    position:relative;
  }
  .close-btn{
    position:absolute; top:16px; right:18px; background:none; border:none;
    font-size:1.3rem; color:var(--ink); opacity:0.55; cursor:pointer; line-height:1;
  }
  .close-btn:hover{opacity:1;}
  .page-cat{
    font-family:'Quicksand'; font-weight:700; font-size:0.72rem; letter-spacing:0.12em;
    text-transform:uppercase; color:var(--coral); margin:0 0 8px;
  }
  .page h2{font-family:'Fraunces', serif; font-size:1.55rem; margin:0 0 4px; font-weight:600;}
  .page .age{font-size:0.82rem; color:#7a6f55; margin:0 0 20px;}

  .audio-controls{
    display:flex; align-items:center; gap:10px; margin-bottom:18px;
    background:rgba(42,36,64,0.06); border-radius:12px; padding:10px 14px;
  }
  .audio-btn{
    border:none; background:var(--coral); color:#fff; border-radius:50%;
    width:38px; height:38px; font-size:1rem; cursor:pointer; flex-shrink:0;
    display:flex; align-items:center; justify-content:center; line-height:1;
    font-weight:700;
  }
  .audio-btn:hover{filter:brightness(1.08);}
  .audio-btn.secondary{background:#ffffff; color:var(--ink); border:1px solid rgba(42,36,64,0.25);}
  .audio-btn.secondary:hover{background:#f3eee0;}
  .audio-status{font-size:0.82rem; color:#7a6f55; font-weight:600;}
  .speed-select{
    margin-left:auto; font-size:0.78rem; border-radius:8px; border:1px solid rgba(42,36,64,0.2);
    padding:5px 7px; background:#fff; color:var(--ink); font-family:'Quicksand';
  }

  .story-text{font-size:1.04rem; line-height:1.8; font-family:'Fraunces', serif; font-weight:400;}
  .story-text p{margin:0 0 14px;}
  .w{padding:0 1px; border-radius:3px; transition:background 0.12s ease;}
  .wordhit{
    background:rgba(227,135,106,0.22); border-bottom:2px dotted var(--coral);
    cursor:pointer; font-weight:600;
  }
  .wordhit:hover{background:rgba(227,135,106,0.38);}
  .w.speaking{background:var(--gold-soft); box-shadow:0 0 0 2px var(--gold-soft);}

  .vocab-panel{
    margin-top:24px; padding-top:18px; border-top:1px solid rgba(42,36,64,0.15);
  }
  .vocab-panel h3{
    font-family:'Quicksand'; font-size:0.78rem; letter-spacing:0.1em; text-transform:uppercase;
    color:#7a6f55; margin:0 0 12px; font-weight:700;
  }
  .vocab-list{display:flex; flex-direction:column; gap:10px;}
  .vocab-item{
    background:rgba(42,36,64,0.05); border-radius:10px; padding:10px 14px;
  }
  .vocab-word{font-family:'Quicksand'; font-weight:700; color:var(--ink); font-size:0.95rem;}
  .vocab-mean{font-size:0.88rem; color:#544a3e; margin:3px 0 0;}

  .footer-note{
    text-align:center; color:var(--mist); font-size:0.78rem; margin-top:40px; line-height:1.6;
  }

  .back-link{
    display:inline-block; margin-bottom:18px; color:var(--gold-soft); font-size:0.85rem;
    cursor:pointer; font-weight:600; background:none; border:none; padding:0;
  }

  /* Story table list page */
  .table-wrap{
    background:rgba(244,239,230,0.06); border:1px solid rgba(244,239,230,0.14);
    border-radius:14px; overflow:hidden; margin-bottom:10px;
  }
  table.story-table{ width:100%; border-collapse:collapse; }
  table.story-table th{
    text-align:left; font-family:'Quicksand'; font-size:0.72rem; letter-spacing:0.08em;
    text-transform:uppercase; color:var(--gold-soft); font-weight:700;
    padding:12px 14px; border-bottom:1px solid rgba(244,239,230,0.16);
    background:rgba(244,239,230,0.05);
  }
  table.story-table td{
    padding:12px 14px; border-bottom:1px solid rgba(244,239,230,0.08);
    font-size:0.92rem; vertical-align:middle;
  }
  table.story-table tr:last-child td{ border-bottom:none; }
  .sno-cell{ color:var(--mist); width:40px; }
  .story-name-link{
    color:var(--cream); font-weight:600; cursor:pointer; text-decoration:none;
    border-bottom:1px dotted var(--gold-soft);
  }
  .story-name-link:hover{ color:var(--gold-soft); }
  .lang-select{
    font-size:0.82rem; border-radius:8px; border:1px solid rgba(244,239,230,0.25);
    padding:6px 8px; background:rgba(20,18,40,0.4); color:var(--cream); font-family:'Quicksand';
  }
  .lang-select option{ color:#222; }
  .play-radio-cell{ display:flex; align-items:center; gap:8px; cursor:pointer; }
  .play-radio-cell input[type=radio]{
    width:16px; height:16px; accent-color:var(--gold); cursor:pointer;
  }
  .play-radio-cell span{ font-size:0.85rem; color:var(--mist); }

  .lang-unavailable-note{
    font-size:0.75rem; color:var(--coral); margin:6px 2px 0;
  }
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="wrap">
  <div class="hero" id="hero">
    <div class="moon"></div>
    <h1>Bedtime Stories</h1>
    <p class="tagline">Pick a feeling. Choose a story. Listen, and learn a few new words along the way.</p>
  </div>

  <div class="lanterns" id="lanterns"></div>

  <div id="bookView">
    <p class="shelf-label" id="shelfLabel">Choose a category above to see its stories</p>
    <div id="contentArea"></div>
  </div>

  <p class="footer-note" id="footerNote">Tap any <span class="wordhit" style="cursor:default;">underlined word</span> inside a story to learn what it means.</p>
</div>

<script>
const CATEGORIES = [
  {id:'moral', label:'Moral', emoji:'🪔'},
  {id:'funny', label:'Funny', emoji:'😄'},
  {id:'scary', label:'Scary', emoji:'👻'},
  {id:'suspense', label:'Suspense', emoji:'🔍'},
  {id:'action', label:'Action', emoji:'🚀'},
  {id:'inspirational', label:'Inspiring', emoji:'🌱'},
];

const STORIES = [
  // ---- MORAL: batch 2 ----
  {
    id:'thirsty-crow', category:'moral', age:'Ages 4–7',
    title:'The Thirsty Crow',
    paragraphs:[
      "On a blazing summer day, a tired crow flew over a dry, dusty village searching desperately for water. Her throat was parched and her wings felt heavy, but every pond she passed had dried into cracked mud.",
      "Just as she was about to give up, she spotted a tall clay pot sitting beside a window. Hope filled her heart as she swooped down — but when she peered inside, the water sat far below, too deep for her short beak to reach.",
      "She tried tipping the pot, but it was much too heavy to budge. She thought about flying away, but something made her pause and look around the yard instead. Scattered near the pot were dozens of small white pebbles.",
      "An idea sparked in her clever mind. One by one, she picked up the pebbles in her beak and dropped them into the pot, plink, plink, plink. Slowly but surely, the water rose higher and higher with each pebble she added.",
      "Finally, the water reached the rim, and the crow drank deeply, feeling refreshed at last. She had learned, in that dusty yard, that patience and clever thinking can solve problems that strength alone cannot."
    ],
    vocab:[
      {word:'parched', meaning:'extremely dry, especially from thirst', example:'His throat felt parched after the long walk.'},
      {word:'desperately', meaning:'in a way that shows great need or urgency', example:'She searched desperately for her lost keys.'},
      {word:'budge', meaning:'to move slightly', example:'The heavy rock would not budge an inch.'},
      {word:'scattered', meaning:'spread out in different directions', example:'Toys were scattered across the floor.'},
      {word:'refreshed', meaning:'feeling new energy after rest or relief', example:'She felt refreshed after a cool drink of water.'}
    ]
  },
  {
    id:'two-goats-bridge', category:'moral', age:'Ages 5–8',
    title:'The Two Goats on the Bridge',
    paragraphs:[
      "Deep in a green valley, a narrow wooden bridge stretched over a roaring river — so narrow that only one animal could cross it at a time. One morning, two goats arrived from opposite ends, each determined to cross first.",
      "\"Move aside!\" shouted the goat from the east. \"I was here first!\" bleated the goat from the west, refusing to step back. Neither would budge, and they stood nose to nose right in the middle of the rickety bridge.",
      "As they argued, the bridge groaned and creaked beneath their stubborn hooves, swaying dangerously over the rushing water below. A wise old tortoise, watching from the riverbank, called out, \"If you both push forward, you will both fall!\"",
      "The goats paused, suddenly noticing how the bridge trembled. After a moment of thought, the western goat had an idea. \"Let's lie down flat,\" she said, \"and you can carefully step over me.\"",
      "Her companion did just that, stepping gently over her back, and soon both goats stood safely on solid ground, laughing with relief. They realized that giving way to one another had saved them both, while stubbornness nearly cost them everything."
    ],
    vocab:[
      {word:'determined', meaning:'having made a firm decision', example:'She was determined to win the race.'},
      {word:'refusing', meaning:'saying no to something', example:'He kept refusing to share his toys.'},
      {word:'stubborn', meaning:'unwilling to change one\'s mind', example:'The stubborn mule wouldn\'t move.'},
      {word:'trembled', meaning:'shook slightly, often from fear or weakness', example:'The old bridge trembled in the wind.'},
      {word:'companion', meaning:'a friend or someone who accompanies you', example:'His dog was his loyal companion.'}
    ]
  },
  {
    id:'farmers-three-sons', category:'moral', age:'Ages 6–9',
    title:'The Farmer\'s Bundle of Sticks',
    paragraphs:[
      "An old farmer had three sons who constantly argued and competed with one another, never working as a team. Worried about what would happen to his land after he was gone, he decided to teach them an important lesson.",
      "One evening, he called his sons together and handed each of them a single, thin stick. \"Break it,\" he said simply. Each son snapped his stick in half without any effort at all, smirking at how easy it was.",
      "Next, the farmer gathered a bundle of ten sticks, tied them tightly together with rope, and handed the bundle to his eldest son. \"Now break this,\" he instructed. The son strained and grunted, but the bundle would not crack.",
      "One by one, each brother tried with all his strength, yet the tightly bound bundle remained whole and unbroken. Exhausted, they finally turned to their father, puzzled by what he was trying to show them.",
      "\"A single stick breaks easily, just as a man alone is easily defeated,\" the farmer explained gently. \"But bound together, like this bundle, you become nearly impossible to break.\" From that day forward, the three brothers worked side by side, and their farm flourished more than ever before."
    ],
    vocab:[
      {word:'competed', meaning:'tried to win or be better than others', example:'The two runners competed for first place.'},
      {word:'effort', meaning:'physical or mental energy put into a task', example:'It took great effort to climb the hill.'},
      {word:'strained', meaning:'made a great physical effort', example:'He strained to lift the heavy box.'},
      {word:'puzzled', meaning:'confused; unable to understand something', example:'She looked puzzled by the riddle.'},
      {word:'flourished', meaning:'grew or developed successfully', example:'The garden flourished after the rain.'}
    ]
  },
  // ---- FUNNY: batch 2 ----
  {
    id:'upside-down-day', category:'funny', age:'Ages 4–7',
    title:'The Upside-Down Day',
    paragraphs:[
      "One ordinary Tuesday, a mischievous little wizard named Bobo cast a spell to make his porridge stir itself — but his sleepy hand wobbled, and the spell zapped the entire village instead of the bowl.",
      "Suddenly, everyone in the village began doing everything backward. The baker started his day by eating warm bread for breakfast and ended it by mixing dough at midnight. The mayor gave his speeches by whispering, then shouting the loudest parts last.",
      "Worst of all, the village cat began barking like a confused puppy, while the actual dogs proudly meowed from the rooftops, looking rather pleased with themselves. Children walked to school backward, bumping cheerfully into lampposts and giggling the whole way.",
      "Bobo, horrified at the chaos he'd caused, frantically flipped through his spellbook upside down — which, by total accident, was exactly the right way to read it that day. He found the reverse-spell and shouted it as loudly as he could.",
      "POOF! Everything snapped back to normal — except, oddly enough, the village cat still preferred barking from then on, much to everyone's amusement. Bobo decided that from that day forward, he would absolutely, positively stir his own porridge with a spoon."
    ],
    vocab:[
      {word:'mischievous', meaning:'playfully naughty or causing harmless trouble', example:'The mischievous kitten knocked over the vase.'},
      {word:'wobbled', meaning:'moved unsteadily from side to side', example:'The old table wobbled when touched.'},
      {word:'chaos', meaning:'complete disorder and confusion', example:'The kitchen was in chaos after the party.'},
      {word:'frantically', meaning:'in a wild, hurried, panicked manner', example:'She frantically searched for her glasses.'},
      {word:'amusement', meaning:'the feeling of finding something funny or entertaining', example:'The clown\'s tricks were a source of amusement.'}
    ]
  },
  {
    id:'noisy-shoes', category:'funny', age:'Ages 4–6',
    title:'Bibi\'s Squeaky New Shoes',
    paragraphs:[
      "Bibi got brand new shoes for her birthday, bright red with sparkly laces, and she loved them instantly. There was just one tiny problem — every single step she took made a loud, ridiculous SQUEAK-SQUEAK-SQUEAK sound.",
      "At school, her squeaky shoes interrupted the morning lesson so many times that her teacher started timing how long Bibi could sit still before the next squeak echoed through the classroom. The other kids found it absolutely hilarious.",
      "During the silent reading hour, Bibi tried tiptoeing to the bookshelf, moving as slowly as a sleepy turtle, but the shoes squeaked anyway — SQUEAK! — right in the middle of the library's peaceful silence.",
      "By lunchtime, three other kids had started imitating her squeaky walk on purpose, turning the hallway into a chorus of ridiculous squeaking sounds, much to the janitor's confused amusement.",
      "That evening, Bibi's grandmother sprinkled a little baby powder inside the shoes, and the squeaking finally stopped. Bibi was secretly a tiny bit disappointed — she had grown rather fond of being the squeakiest, most noticeable kid in the whole school."
    ],
    vocab:[
      {word:'ridiculous', meaning:'silly or absurd in a funny way', example:'The dog wore a ridiculous hat.'},
      {word:'interrupted', meaning:'stopped something from continuing briefly', example:'A loud noise interrupted the movie.'},
      {word:'imitating', meaning:'copying someone\'s actions or sounds', example:'The parrot was imitating his owner\'s voice.'},
      {word:'chorus', meaning:'a group of sounds happening together', example:'A chorus of laughter filled the room.'},
      {word:'fond', meaning:'having affection or liking for something', example:'She grew fond of her new puppy.'}
    ]
  },
  {
    id:'grumpy-cloud', category:'funny', age:'Ages 5–8',
    title:'The Grumpiest Cloud in the Sky',
    paragraphs:[
      "High above the town floated Grumble, the grumpiest little raincloud anyone had ever seen, who scowled at absolutely everything — sunshine, rainbows, even fluffy bunny-shaped clouds passing by.",
      "While other clouds drifted along happily, occasionally sprinkling gentle rain on flowers, Grumble preferred to grumble loudly about how \"sunny days are simply too cheerful\" and \"birds sing far too early in the morning.\"",
      "One day, a cheerful young cloud named Puff floated over and asked, \"Why are you always so grumpy, Grumble?\" Without thinking, Grumble snapped back so grumpily that a tiny, surprised raindrop popped right out of him.",
      "He looked down and saw the raindrop land perfectly on a wilting flower below, which immediately perked up, its petals stretching toward the sky in gratitude. Grumble blinked in surprise — he had never noticed he could actually help anyone.",
      "Curious, he grumbled a little more, just to see what would happen, and more raindrops fell, watering an entire garden of thirsty flowers. From that day on, Grumble kept right on grumbling — because apparently, his grumbling made the prettiest gardens in town."
    ],
    vocab:[
      {word:'scowled', meaning:'made an angry or annoyed facial expression', example:'He scowled at the rainy weather.'},
      {word:'cheerful', meaning:'happy and pleasant', example:'She greeted everyone with a cheerful smile.'},
      {word:'gratitude', meaning:'the feeling of being thankful', example:'He expressed gratitude for the gift.'},
      {word:'perked', meaning:'became more lively or alert suddenly', example:'The plant perked up after watering.'},
      {word:'curious', meaning:'eager to learn or know something', example:'The curious cat explored every corner.'}
    ]
  },
  // ---- SCARY (gentle): batch 2 ----
  {
    id:'creaky-stairs', category:'scary', age:'Ages 7–10',
    title:'The Secret Behind the Creaky Stairs',
    paragraphs:[
      "Every single night at exactly nine o'clock, the old wooden stairs in Devan's grandmother's house let out a long, low CREEEEAK, as if someone invisible were slowly climbing them one step at a time.",
      "Devan had heard it every night since they moved in, and tonight, lying awake under his blanket, he finally decided he'd had enough wondering. Armed with only a small flashlight, he crept toward the staircase.",

      "Instead, he spotted something small and furry darting along the railing — a fat, fluffy squirrel who had apparently been sneaking into the attic through a gap in the roof every night to nibble on stored walnuts.",
      "Devan burst out laughing with relief, his fear melting into giggles. The \"haunted staircase\" turned out to be nothing more than one very determined, very chubby squirrel — and Devan made sure to leave a few walnuts on the porch from then on, just to keep the peace."
    ],
    vocab:[
      {word:'invisible', meaning:'unable to be seen', example:'The wind felt invisible but strong.'},
      {word:'crept', meaning:'moved slowly and quietly', example:'She crept past the sleeping dog.'},
      {word:'thumped', meaning:'beat heavily, like a heart pounding', example:'His heart thumped with excitement.'},
      {word:'darting', meaning:'moving suddenly and quickly', example:'The mouse went darting across the floor.'},
      {word:'relief', meaning:'a feeling of comfort after worry ends', example:'She sighed with relief when she found her keys.'}
    ]
  },
  {
    id:'whispering-well', category:'scary', age:'Ages 8–11',
    title:'The Whispering Well',
    paragraphs:[
      "Behind the old schoolhouse stood a stone well that the children swore was haunted, for if you leaned close enough, you could hear a faint, raspy whisper rising up from somewhere deep within the darkness.",

    ],
    vocab:[
      {word:'raspy', meaning:'rough or harsh sounding', example:'His voice was raspy after the cold.'},
      {word:'prickled', meaning:'felt a stinging, tingling sensation', example:'Her skin prickled with cold.'},
      {word:'astonishment', meaning:'great surprise', example:'She stared in astonishment at the magic trick.'},
      {word:'summoning', meaning:'calling upon or gathering, like courage or strength', example:'He summoned the courage to speak up.'},
      {word:'caretaker', meaning:'a person who looks after a place or building', example:'The caretaker locked the school gates each night.'}
    ]
  },
  {
    id:'shadow-under-bed', category:'scary', age:'Ages 6–9',
    title:'The Shadow Under the Bed',
    paragraphs:[

const LANGUAGES = ['English', 'Hindi', 'Telugu'];

// Render stars
const starsEl = document.getElementById('stars');
for(let i=0;i<40;i++){
  const s = document.createElement('div');
  s.className='star';
  s.style.left = Math.random()*100+'%';
  s.style.top = Math.random()*100+'%';
  s.style.animationDelay = (Math.random()*4)+'s';
  starsEl.appendChild(s);

let activeCategory = null;
let currentList = [];        // ordered list of stories for the active category
let storyLang = {};          // storyId -> selected language
let currentStoryIndex = -1;  // index within currentList currently open

function showHome(){
  stopSpeech();
  activeCategory = null;
  document.getElementById('hero').style.display = 'block';
  document.getElementById('lanterns').style.display = 'grid';
  document.getElementById('shelfLabel').textContent = 'Choose a category above to see its stories';
  document.getElementById('footerNote').style.display = 'block';
  document.getElementById('contentArea').innerHTML = '';
}

function renderLanterns(){
  const el = document.getElementById('lanterns');
  el.innerHTML = '';
  CATEGORIES.forEach(cat=>{
    const btn = document.createElement('div');
    btn.className = 'lantern' + (activeCategory===cat.id ? ' active':'');
    btn.innerHTML = `<span class="emoji">${cat.emoji}</span>${cat.label}`;
    btn.onclick = ()=>{ stopSpeech(); openList(cat.id); };
    el.appendChild(btn);
  });
}

function openList(categoryId){
  activeCategory = categoryId;
  currentList = STORIES.filter(s=>s.category===categoryId);
  currentList.forEach(s=>{ if(!storyLang[s.id]) storyLang[s.id] = 'English'; });
  document.getElementById('hero').style.display = 'none';
  document.getElementById('lanterns').style.display = 'none';
  document.getElementById('footerNote').style.display = 'none';
  renderListPage();
}

function renderListPage(){
  const catMeta = CATEGORIES.find(c=>c.id===activeCategory);
  document.getElementById('shelfLabel').textContent = `${catMeta.emoji} ${catMeta.label} stories`;

  const rows = currentList.map((story, idx)=>{
    const langOptions = LANGUAGES.map(l=>`<option value="${l}" ${storyLang[story.id]===l?'selected':''}>${l}</option>`).join('');
    return `
      <tr>
        <td class="sno-cell">${idx+1}</td>
        <td><span class="story-name-link" data-idx="${idx}">${story.title}</span></td>
        <td><select class="lang-select" data-story="${story.id}">${langOptions}</select></td>
        <td>
          <label class="play-radio-cell">
            <input type="radio" name="playPick" data-idx="${idx}">
            <span>Play</span>
          </label>
        </td>
      </tr>`;
  }).join('');

  document.getElementById('contentArea').innerHTML = `
    <button class="back-link" id="backToHome">← All categories</button>

    <div class="audio-controls" id="miniPlayer" style="margin-bottom:16px;">
      <button class="audio-btn" id="miniPlayBtn">▶</button>
      <button class="audio-btn secondary" id="miniPauseBtn">❙❙</button>
      <button class="audio-btn secondary" id="miniStopBtn">■</button>
      <button class="audio-btn secondary" id="miniNextBtn">⏭</button>
      <span class="audio-status" id="miniStatus">Pick a story below, or tap play to start the first one</span>
    </div>

    <div class="table-wrap">
      <table class="story-table">
        <thead>
          <tr><th>SNo</th><th>Story Name</th><th>Language</th><th>Play</th></tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <p class="lang-unavailable-note">Hindi &amp; Telugu narration coming soon — these currently play the English version.</p>
  `;

  document.getElementById('backToHome').onclick = showHome;

  document.querySelectorAll('.story-name-link').forEach(el=>{
    el.onclick = ()=>{ stopSpeech(); openStoryPage(parseInt(el.getAttribute('data-idx'),10)); };
  });
  document.querySelectorAll('input[name="playPick"]').forEach(el=>{
    el.onchange = ()=> playFromList(parseInt(el.getAttribute('data-idx'),10));
  });
  document.querySelectorAll('.lang-select').forEach(sel=>{
    sel.onchange = ()=>{ storyLang[sel.getAttribute('data-story')] = sel.value; };
  });

  setupMiniPlayerControls();
}

function setupMiniPlayerControls(){
  const mini = document.getElementById('miniPlayer');
  document.getElementById('miniPlayBtn').onclick = ()=>{
    if(window.speechSynthesis.paused){
      window.speechSynthesis.resume();
      document.getElementById('miniStatus').textContent = `Playing: ${currentList[currentStoryIndex].title}`;
    } else if(!window.speechSynthesis.speaking){
      if(currentStoryIndex < 0) currentStoryIndex = 0;
      const radio = document.querySelector(`input[name="playPick"][data-idx="${currentStoryIndex}"]`);
      if(radio) radio.checked = true;
      speechState.autoNext = true;
      playCurrentStoryInline();
    }
  };
  document.getElementById('miniPauseBtn').onclick = ()=>{
    if(window.speechSynthesis.speaking && !window.speechSynthesis.paused){
      window.speechSynthesis.pause();
      document.getElementById('miniStatus').textContent = 'Paused';
    }
  };
  document.getElementById('miniStopBtn').onclick = ()=>{
    stopSpeech();
    document.getElementById('miniStatus').textContent = 'Stopped';
    document.querySelectorAll('input[name="playPick"]').forEach(r=>r.checked=false);
  };
  document.getElementById('miniNextBtn').onclick = ()=>{
    window.speechSynthesis.cancel();
    if(currentStoryIndex < currentList.length - 1){
      currentStoryIndex += 1;
      const nextRadio = document.querySelector(`input[name="playPick"][data-idx="${currentStoryIndex}"]`);
      if(nextRadio) nextRadio.checked = true;
      speechState.autoNext = true;
      playCurrentStoryInline();
    } else {
      document.getElementById('miniStatus').textContent = 'No more stories in this list';
    }
  };
}

// Plays a story's audio directly on the list page (no navigation), with auto-next through the list
function playFromList(idx){
  currentStoryIndex = idx;
  speechState.autoNext = true;
  speechState.inlineMode = true;
  playCurrentStoryInline();
}

function playCurrentStoryInline(){
  const story = currentList[currentStoryIndex];
  if(!story) return;
  const statusEl = document.getElementById('miniStatus');
  if(statusEl) statusEl.textContent = `Playing: ${story.title}`;
  speakStoryAudioOnly(story, ()=>{
    if(speechState.autoNext && currentStoryIndex < currentList.length - 1){
      currentStoryIndex += 1;
      // move the radio selection to match
      const nextRadio = document.querySelector(`input[name="playPick"][data-idx="${currentStoryIndex}"]`);
      if(nextRadio) nextRadio.checked = true;
      if(statusEl) statusEl.textContent = 'Up next…';
      setTimeout(playCurrentStoryInline, 800);
    } else {
      if(statusEl) statusEl.textContent = 'All done — select Play to listen again';
    }
  });
}

let cachedVoice = null;
function pickStoryVoice(){
  if(cachedVoice) return cachedVoice;
  const voices = window.speechSynthesis.getVoices();
  if(!voices.length) return null;
  const preferredNames = [
    'Google UK English Female', 'Microsoft Aria Online (Natural) - English (United States)',
    'Microsoft Jenny Online (Natural) - English (United States)', 'Samantha',
    'Microsoft Zira Desktop - English (United States)', 'Google US English'
  ];
  for(const name of preferredNames){
    const found = voices.find(v=>v.name === name);
    if(found){ cachedVoice = found; return cachedVoice; }
  }
  const femaleHint = /female|woman|zira|aria|jenny|samantha|susan|victoria|moira|tessa|karen|fiona|amelia/i;
  let found = voices.find(v=>v.lang.startsWith('en') && femaleHint.test(v.name));
  if(found){ cachedVoice = found; return cachedVoice; }
  found = voices.find(v=>v.lang.startsWith('en'));
  cachedVoice = found || voices[0];
  return cachedVoice;
}
if('speechSynthesis' in window){
  window.speechSynthesis.onvoiceschanged = ()=>{ cachedVoice = null; pickStoryVoice(); };
}

function applyVoiceSettings(utterance, rate){
  const voice = pickStoryVoice();
  if(voice) utterance.voice = voice;
  utterance.rate = rate;
  utterance.pitch = 1.18;
  utterance.volume = 1;
}

// ---- Speech / word highlighting ----
function tokenize(paragraph){
  return paragraph.split(/\s+/).filter(Boolean);
}

function buildParagraphHtml(paragraph, vocab, paraIndex){
  const words = tokenize(paragraph);
  const vocabLower = vocab.map(v=>v.word.toLowerCase());
  const spans = words.map((w, i)=>{
    const cleanWord = w.replace(/[^a-zA-Z']/g, '');
    const isVocab = vocabLower.includes(cleanWord.toLowerCase());
    const cls = 'w' + (isVocab ? ' wordhit' : '');
    const dataWord = isVocab ? ` data-word="${cleanWord}"` : '';
    return `<span class="${cls}" data-p="${paraIndex}" data-i="${i}"${dataWord}>${w}</span>`;
  });
  return spans.join(' ');
}

let speechState = { playing:false, autoNext:false };

function stopSpeech(){
  window.speechSynthesis.cancel();
  document.querySelectorAll('.w.speaking').forEach(el=>el.classList.remove('speaking'));
  speechState.playing = false;
  speechState.autoNext = false;
  const statusEl = document.getElementById('audioStatus');
  const playBtn = document.getElementById('playBtn');
  if(statusEl) statusEl.textContent = 'Ready to read aloud';
  if(playBtn) playBtn.textContent = '▶';
}

function speakStory(story, onFinished){
  if(!('speechSynthesis' in window)){
    alert('Voice reading is not supported in this browser. Try Chrome or Edge.');
    return;
  }
  window.speechSynthesis.cancel();
  const rateSelect = document.getElementById('speedSelect');
  const rate = rateSelect ? parseFloat(rateSelect.value) : 0.9;

  const utterances = story.paragraphs.map((p, pIdx)=>{
    const words = tokenize(p);
    const text = words.join(' ');
    const u = new SpeechSynthesisUtterance(text);
    applyVoiceSettings(u, rate);
    const offsets = [];
    let pos = 0;
    words.forEach((w)=>{ offsets.push(pos); pos += w.length + 1; });
    u.onboundary = (event)=>{
      if(event.name !== 'word') return;
      let idx = 0;
      for(let k=0;k<offsets.length;k++){ if(offsets[k] <= event.charIndex) idx = k; else break; }
      document.querySelectorAll('.w.speaking').forEach(el=>el.classList.remove('speaking'));
      const target = document.querySelector(`.w[data-p="${pIdx}"][data-i="${idx}"]`);
      if(target){ target.classList.add('speaking'); target.scrollIntoView({block:'nearest', behavior:'smooth'}); }
    };
    u.onend = ()=>{
      document.querySelectorAll('.w.speaking').forEach(el=>el.classList.remove('speaking'));
      if(pIdx === story.paragraphs.length - 1 && onFinished) onFinished();
    };
    return u;
  });

  speechState.playing = true;
  const statusEl = document.getElementById('audioStatus');
  const playBtn = document.getElementById('playBtn');
  if(statusEl) statusEl.textContent = 'Reading aloud…';
  if(playBtn) playBtn.textContent = '⏸';
  utterances.forEach(u=>window.speechSynthesis.speak(u));
}

function speakStoryAudioOnly(story, onFinished){
  if(!('speechSynthesis' in window)){
    alert('Voice reading is not supported in this browser. Try Chrome or Edge.');
    return;
  }
  window.speechSynthesis.cancel();
  const utterances = story.paragraphs.map((p, pIdx)=>{
    const u = new SpeechSynthesisUtterance(p);
    applyVoiceSettings(u, 0.88);
    u.onend = ()=>{ if(pIdx === story.paragraphs.length - 1 && onFinished) onFinished(); };
    return u;
  });
  utterances.forEach(u=>window.speechSynthesis.speak(u));
}

function togglePlay(){
  const story = currentList[currentStoryIndex];
  if(!story) return;
  if(window.speechSynthesis.speaking && !window.speechSynthesis.paused){
    window.speechSynthesis.pause();
    speechState.playing = false;
    document.getElementById('audioStatus').textContent = 'Paused';
    document.getElementById('playBtn').textContent = '▶';
  } else if(window.speechSynthesis.paused){
    window.speechSynthesis.resume();
    speechState.playing = true;
    document.getElementById('audioStatus').textContent = 'Reading aloud…';
    document.getElementById('playBtn').textContent = '⏸';
  } else {
    speechState.autoNext = true;
    playCurrentStory();
  }
}

function playCurrentStory(){
  const story = currentList[currentStoryIndex];
  if(!story) return;
  speakStory(story, handleStoryFinished);
}

function handleStoryFinished(){
  speechState.playing = false;
  if(speechState.autoNext && currentStoryIndex < currentList.length - 1){
    const statusEl = document.getElementById('audioStatus');
    if(statusEl) statusEl.textContent = 'Up next…';
    setTimeout(()=>{
      currentStoryIndex += 1;
      renderStoryPage();
      playCurrentStory();
    }, 900);
  } else {
    const statusEl = document.getElementById('audioStatus');
    const playBtn = document.getElementById('playBtn');
    if(statusEl) statusEl.textContent = speechState.autoNext ? 'All stories finished — tap play to start over' : 'Finished — tap play to hear it again';
    if(playBtn) playBtn.textContent = '▶';
  }
}

// ---- Story page (dedicated page, not a modal) ----
function openStoryPage(idx){
  currentStoryIndex = idx;
  speechState.autoNext = false;
  speechState.inlineMode = false;
  renderStoryPage();
}

function renderStoryPage(){
  const story = currentList[currentStoryIndex];
  const catMeta = CATEGORIES.find(c=>c.id===story.category);
  const lang = storyLang[story.id] || 'English';
  const paraHtml = story.paragraphs.map((p, idx)=>`<p>${buildParagraphHtml(p, story.vocab, idx)}</p>`).join('');
  const vocabHtml = story.vocab.map(v=>`
    <div class="vocab-item">
      <div class="vocab-word">${v.word}</div>
      <div class="vocab-mean">${v.meaning}<br><em>"${v.example}"</em></div>
    </div>`).join('');
  const langNote = lang!=='English' ? `<p class="lang-unavailable-note">${lang} narration is coming soon — playing the English version for now.</p>` : '';
  const nextNote = currentStoryIndex < currentList.length - 1
    ? `Next up: "${currentList[currentStoryIndex+1].title}"`
    : 'This is the last story in this category';

  document.getElementById('contentArea').innerHTML = `
    <button class="back-link" id="backToList">← Back to ${catMeta.label} list</button>
    <div class="page" style="margin:0 0 10px;">
      <p class="page-cat">${catMeta.emoji} ${catMeta.label} · Story ${currentStoryIndex+1} of ${currentList.length}</p>
      <h2>${story.title}</h2>
      <p class="age">${story.age} · ${lang}</p>
      ${langNote}
      <div class="audio-controls">
        <button class="audio-btn" id="playBtn">▶</button>
        <button class="audio-btn secondary" id="pauseBtn">❙❙</button>
        <button class="audio-btn secondary" id="stopBtn">■</button>
        <button class="audio-btn secondary" id="nextBtn">⏭</button>
        <span class="audio-status" id="audioStatus">Ready to read aloud</span>
        <select class="speed-select" id="speedSelect">
          <option value="0.7">Slow</option>
          <option value="0.9" selected>Normal</option>
          <option value="1.15">Fast</option>
        </select>
      </div>
      <div class="story-text">${paraHtml}</div>
      <p class="age" style="margin-top:14px;">${nextNote}</p>
      <div class="vocab-panel">
        <h3>New words in this story</h3>
        <div class="vocab-list">${vocabHtml}</div>
      </div>
    </div>
  `;

  document.getElementById('backToList').onclick = ()=>{ stopSpeech(); renderListPage(); };
  document.getElementById('playBtn').onclick = ()=>{ speechState.autoNext = true; togglePlay(); };
  document.getElementById('pauseBtn').onclick = ()=>{
    if(window.speechSynthesis.speaking && !window.speechSynthesis.paused){
      window.speechSynthesis.pause();
      document.getElementById('audioStatus').textContent = 'Paused';
      document.getElementById('playBtn').textContent = '▶';
    }
  };
  document.getElementById('stopBtn').onclick = ()=> stopSpeech();
  document.getElementById('nextBtn').onclick = ()=>{
    window.speechSynthesis.cancel();
    if(currentStoryIndex < currentList.length - 1){
      currentStoryIndex += 1;
      speechState.autoNext = true;
      renderStoryPage();
      playCurrentStory();
    } else {
      document.getElementById('audioStatus').textContent = 'No more stories in this list';
    }
  };

  document.querySelectorAll('.wordhit').forEach(el=>{
    el.onclick = (e)=>{
      e.stopPropagation();
      const word = el.getAttribute('data-word');
      const v = story.vocab.find(x=>x.word.toLowerCase()===word.toLowerCase());
      if(v) alert(`${v.word}\n\n${v.meaning}\n\nExample: "${v.example}"`);
    };
  });
}

renderLanterns();

</script>
