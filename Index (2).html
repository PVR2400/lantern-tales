'lion-and-mouse': [
  "एक बड़ा शेर एक छायादार पेड़ के नीचे आराम से सो रहा था। तभी एक छोटी-सी चूहिया उसकी नाक पर से दौड़ गई और शेर अचानक जाग गया।",
  "गुस्से में शेर ने चूहिया को एक बड़े पंजे में दबोच लिया। 'माफ़ करो मुझे,' चूहिया काँपते हुए बोली। 'एक दिन मैं भी तुम्हारे काम आऊँगी।' शेर ने ठहाका लगाया — इतनी छोटी चूहिया उसके क्या काम आएगी!",
  "पर शेर को उसकी बात मज़ेदार लगी और उसने चूहिया को छोड़ दिया। कुछ हफ्ते बाद शेर एक शिकारी के जाल में फँस गया और जितना छटपटाया, रस्सियाँ उतनी ही कसती गईं।",
  "दूर से चूहिया की आवाज़ सुनाई दी। वह भागती हुई आई और अपने तेज़ दाँतों से रस्सियाँ काटने लगी।",
  "आज़ाद होने के बाद शेर ने चूहिया को नई नज़र से देखा। उस दिन के बाद उसने कभी किसी को उसके आकार से नहीं आँका — छोटे से दोस्त से भी बड़ी मदद मिल सकती है।"
],
'shepherd-boy-wolf': [
  "एक छोटा चरवाहा लड़का हर रोज़ अकेला पहाड़ी पर बकरियाँ चराता था। एक दिन उसे शरारत सूझी और उसने ज़ोर से चिल्लाया — 'भेड़िया आया! भेड़िया!'",
  "गाँव वाले डंडे लेकर भागे आए। पर वहाँ कोई भेड़िया नहीं था — लड़का हँस रहा था। शर्मिंदा होकर वे वापस चले गए।",
  "अगले हफ्ते लड़के ने फिर वही किया। गाँव वाले फिर आए और फिर ठगे गए।",
  "फिर एक दिन सच में एक भेड़िया जंगल से निकलकर बकरियों पर झपटा। डरे हुए लड़के ने पूरी ताकत से चिल्लाया — 'भेड़िया! भेड़िया!' पर इस बार कोई नहीं आया।",
  "गाँव वालों ने सोचा यह फिर मज़ाक है और अपना काम करते रहे। लड़के को बहुत देर से समझ में आया — झूठ बोलकर खोया हुआ भरोसा वापस पाना बहुत मुश्किल होता है।"
],
'ant-and-grasshopper': [
  "पूरी गर्मी भर एक खुशमिज़ाज टिड्डा गाना गाता और नाचता रहा, जबकि एक मेहनती चींटी अनाज के दाने इकट्ठे करके सर्दियों के लिए जमा करती रही।",
  "'इतनी मेहनत क्यों?' टिड्डे ने बीच-बीच में पूछा। 'आओ, इस सुंदर मौसम में मेरे साथ नाचो।' चींटी ने बस मुस्कुरा दिया और काम में लगी रही।",
  "जब पतझड़ आया और दिन छोटे होने लगे, तब टिड्डे को एहसास हुआ कि उसके पास खाना बिल्कुल नहीं है — पूरी गर्मी गाने में बिता दी थी।",
  "जब सर्दियों की पहली ठंड पड़ी, भूखा-काँपता टिड्डा चींटी के दरवाज़े पर आया। चींटी ने दया करके उसे अंदर बुलाया और अपना जमा किया खाना उसके साथ बाँटा।",
  "'काश मैंने तुम्हारी बात मानी होती!' टिड्डे ने कृतज्ञता से कहा। चींटी ने नरमी से जवाब दिया — 'गाने और तैयारी दोनों के लिए समय होता है — बस सही संतुलन रखना पड़ता है।'"
],
'three-fish-pond': [
  "एक शांत तालाब में तीन मछलियाँ रहती थीं — एक समझदार, एक तेज़ सोचने वाली, और एक जो हमेशा यही कहती थी — 'सब ठीक हो जाएगा।'",
  "एक शाम उन्होंने दो मछुआरों को बात करते सुना — कल सुबह तालाब खाली करके सारी मछलियाँ पकड़ेंगे। समझदार मछली उसी रात नदी की नाली से होकर सुरक्षित निकल गई।",
  "सुबह होते ही तेज़ मछली ने ख़तरा भाँप लिया। वह पानी की सतह पर मुर्दे की तरह तैरने लगी। मछुआरों ने उसे बेकार समझकर फेंक दिया — वह तुरंत नदी में कूद गई।",
  "तीसरी मछली बस यही सोचती रही — 'सब ठीक हो जाएगा' — और आलस से तैरती रही, भले ही पानी धीरे-धीरे कम होता जा रहा था।",
  "जब तालाब पूरी तरह सूख गया तो वह जाल में फँस गई। नदी में पहुँची उसकी साथी मछलियाँ उसे याद करती रहीं — सिर्फ उम्मीद लगाए रहना काफ़ी नहीं, सही समय पर कदम उठाना भी ज़रूरी है।"
],
'turtle-race-rabbit': [
  "एक घमंडी खरगोश हमेशा कछुए की धीमी चाल का मज़ाक उड़ाता था। थककर एक दिन कछुए ने दौड़ की चुनौती दे दी — मैदान में एक दौड़।",
  "सब जानवर देखने आए। इशारा होते ही खरगोश बिजली की तरह भागा और कछुआ धीरे-धीरे आगे बढ़ने लगा।",
  "जीत आसान मानकर खरगोश ने रास्ते में एक पेड़ के नीचे सोचा — थोड़ी झपकी ले लेता हूँ, कछुआ आता कहाँ होगा।",
  "खरगोश गहरी नींद में सो गया, जबकि कछुआ एक कदम, फिर एक कदम — बिना रुके, बिना थके, तेज़ दोपहर की धूप में आगे बढ़ता रहा।",
  "जब खरगोश हड़बड़ाकर उठा तो सूरज ढल चुका था। वह दौड़कर अंत की रेखा पर पहुँचा तो कछुआ पहले से वहाँ बैठा था। जानवरों ने तालियाँ बजाईं। खरगोश शर्मिंदा होकर समझ गया — धैर्य और लगन अहंकार को हराती है।"
],
'milkmaid-and-pail': [
  "सोना नाम की एक लड़की एक सुबह सिर पर दूध से भरा घड़ा रखकर बाज़ार की ओर चल पड़ी। मन ही मन वह बड़े सपने बुन रही थी।",
  "'इस दूध को बेचूँगी और मुर्गियाँ खरीदूँगी। मुर्गियाँ अंडे देंगी, अंडे बेचूँगी तो और पैसे आएँगे। उन पैसों से एक सुंदर नई साड़ी खरीदूँगी।'",
  "नई साड़ी में मेले में इतराने का ख्याल आते ही सोना ने अनजाने में सिर एक ओर झटका दिया।",
  "उसी पल घड़ा लुढ़क गया और सारा दूध धूल में बिखर गया। सोना खाली घड़े को देखती रह गई।",
  "बाकी रास्ता वह चुप रही। उसके सपने — मुर्गियाँ, अंडे, साड़ी — सब दूध के साथ बह गए। उसने सीखा — जो अभी नहीं कमाया उसे पहले से गिनते रहने से, जो हाथ में है वह भी खो सकता है।"
],
'two-pots-river': [
  "एक बड़ी बाढ़ में एक मिट्टी का घड़ा और एक पीतल का घड़ा नदी के किनारे बह रहे थे। पीतल के घड़े ने खुशी से कहा — 'चलो, साथ चलते हैं!'",
  "मिट्टी के घड़े ने घबराकर कहा — 'नहीं, मैं दूर रहूँगा। तुम से टकराया तो मैं टूट जाऊँगा।' पर पीतल का घड़ा नहीं माना और मित्रता के नाम पर पास ही रहा।",
  "पीतल के घड़े का कोई बुरा इरादा नहीं था। पर जब नदी एक मोड़ पर तेज़ हुई तो दोनों घड़े एक-दूसरे से टकरा गए।",
  "पीतल के घड़े को कुछ नहीं हुआ, लेकिन मिट्टी के घड़े में एक बड़ी दरार आ गई। वह धीरे-धीरे पानी में डूबने लगा।",
  "डूबते हुए उसे समझ आया — अच्छी नीयत भी कभी-कभी काफ़ी नहीं होती। जब दो बहुत अलग-अलग ताकत के लोग साथ हों तो कमज़ोर को पहले खुद की रक्षा करनी चाहिए।"
],
'wise-king-mango-tree': [
  "एक बुद्धिमान राजा ने एक आम का पौधा लगाकर अपने तीनों बेटों से कहा — 'जो इसकी सबसे अच्छी देखभाल करेगा, वह मेरा उत्तराधिकारी बनेगा।'",
  "बड़े बेटे ने रोज़ बहुत पानी दिया — जल्दी बड़ा करने के लिए। मँझले बेटे ने शायद ही कभी पौधे को देखा, सोचा यह खुद बड़ा हो जाएगा।",
  "छोटे बेटे ने अक्सर पौधे के पास जाकर जाँचा — जब मिट्टी सच में सूखती तभी पानी दिया, धीरे से खर-पतवार हटाया और पौधे की प्राकृतिक गति पर भरोसा किया।",
  "साल बीते। बड़े बेटे का पौधा ज़्यादा पानी से सड़ गया, मँझले का उपेक्षा से मुरझा गया।",
  "छोटे बेटे का पेड़ सुनहरे आमों से लदा, मज़बूत और ऊँचा खड़ा था। राजा ने गर्व से कहा — 'असली ज्ञान न बहुत ज़्यादा करना है, न बिल्कुल न करना — सही समय पर जितना ज़रूरी हो उतना करना है।'"
],
'crows-and-snake': [
  "एक कौवे के जोड़े को हर साल एक चालाक साँप तंग करता था — वह पेड़ पर चढ़कर उनके अंडे खा जाता था। थककर नर कौआ एक चतुर लोमड़ी के पास गया।",
  "लोमड़ी ने ध्यान से सुना और एक चालाक उपाय सुझाया। अगली सुबह मादा कौवी राजमहल के बगीचे में नीचे उड़ी और तालाब के पास रखा रानी का सोने का हार उठा ले गई।",
  "राजभटों ने तुरंत पीछा किया। कौवी चिल्लाते हुए उसी पेड़ की ओर उड़ी जहाँ साँप सोया पड़ा था।",
  "भटों ने खतरनाक साँप देखा और उसे वहाँ से भगा दिया — हमेशा के लिए।",
  "लोमड़ी की चाल कमाल की थी — बल से नहीं, बुद्धि से काम लिया। साँप की खतरनाक प्रकृति को ही उसके खिलाफ इस्तेमाल किया।"
],
'blind-men-elephant': [
  "एक बार छह अंधे विद्वान राजमहल आए और हाथी का अध्ययन करना चाहा। हर किसी ने अलग-अलग हिस्सा छुआ और फिर पूरे यकीन के साथ अपनी राय दी।",
  "पेट छूने वाले ने कहा — 'हाथी दीवार जैसा है।' दाँत पकड़ने वाले ने कहा — 'नहीं, यह भाले जैसा तेज़ है।' सूँड पकड़ने वाले ने कहा — 'यह तो साँप जैसा मुड़ता है।'",
  "पैर पकड़ने वाले ने कहा — 'पेड़ के तने जैसा मोटा है।' कान छूने वाले ने कहा — 'पंखा है।' पूँछ पकड़ने वाले ने कहा — 'रस्सी है।'",
  "जल्द ही सभी ज़ोर-ज़ोर से बहस करने लगे, हर कोई खुद को सही और बाकी सबको गलत समझता था।",
  "राजा ने शांति से कहा — 'आप सभी सही हैं — और सभी गलत भी। हाथी इन सबका मेल है।' उस दिन विद्वानों ने सीखा — सच कभी-कभी हमारी सोच से बहुत बड़ा होता है।"
],
'peacock-envied-nightingale': [
  "एक मोर हर सुबह नदी किनारे अपना खूबसूरत प्रतिबिंब देखकर खुश होता था — जब तक उसने कोयल की मीठी आवाज़ नहीं सुनी।",
  "कोयल का गाना इतना सुरीला था कि जंगल के सब जानवर रुककर सुनते थे। लेकिन जब मोर ने कुछ बोलने की कोशिश की, तो उसकी कर्कश आवाज़ से सब पक्षी उड़ गए।",
  "गुस्से और जलन में मोर ने वन-देवी से शिकायत की — 'इतने सुंदर पंखों का क्या फायदा जब मैं गा नहीं सकता? कोयल के पास बस आवाज़ है और सब उसे चाहते हैं।'",
  "देवी ने शांति से कहा — 'तुम्हारे पंख सूर्यास्त के रंगों को मात देते हैं — यह सौंदर्य किसी गाने से कम नहीं। हर प्राणी को अपनी अलग खूबी मिली है।'",
  "मोर ने फिर से अपना प्रतिबिंब देखा — इस बार जो नहीं था उसे नहीं, जो था उसे देखा। जिस पल हमने दूसरों से खुद की तुलना बंद की, उसी पल सच्ची खुशी मिलती है।"
],
'golden-touch-king': [
  "मिडास राजा को सोने से बेहद प्यार था। एक दिन एक जादुई प्राणी ने उसे वरदान देने की बात कही। राजा ने बिना सोचे माँग लिया — मैं जो भी छुऊँ सोना बन जाए।",
  "पहले तो यह सपने जैसा लगा — फूल, कुर्सी, पत्थर सब सोना बन गए। पर जब उसने सुबह की रोटी उठाई तो वह बेस्वाद सोने की डली में बदल गई।",
  "भूखे राजा का दिल टूट गया। तभी उसकी प्यारी बेटी दौड़ती हुई आई। उसने उसे गले लगाना चाहा — और वह ठंडी, सख्त सोने की मूर्ति में बदल गई।",
  "राजा रोने लगा और उस जादुई प्राणी से गिड़गिड़ाया — 'यह वरदान वापस ले लो!'",
  "वरदान हट गया और बेटी फिर ज़िंदा हो गई। राजा को समझ आया — कोई भी सोना गर्मजोशी, प्यार या खाने की जगह नहीं ले सकता।"
],
'selfish-giant-garden': [
  "एक चिड़चिड़ा दानव एक सुंदर बगीचे में अकेला रहता था। बच्चे कभी वहाँ खेलते थे, पर एक दिन उसने ऊँची दीवार बनाकर 'मत आना' का बोर्ड लगा दिया।",
  "तुरंत ही बगीचे में बसंत आना बंद हो गया। बर्फ नहीं पिघली, पेड़ नहीं खिले, चिड़ियाँ उड़ गईं और एक ठंडी चुप्पी छा गई।",
  "एक सुबह दानव को चिड़ियों का गाना सुनाई दिया। खिड़की से देखा — बच्चे दीवार में एक छोटी सी दरार से घुस आए थे और जहाँ बच्चा था, वहाँ फूल खिल रहे थे।",
  "एक कोने में एक बहुत छोटा बच्चा था जो पेड़ की डाल तक नहीं पहुँच पा रहा था। दानव ने नरमी से उसे उठाया — और वह पेड़ एकदम फूलों से भर गया। बच्चे ने उसके गाल पर प्यार से चुंबन किया।",
  "उसी दोपहर दानव ने खुद अपने हाथों से दीवार गिरा दी। बगीचा फिर हँसी से भर गया, बसंत लौट आया। उसे समझ आया — खुशी बाँटने से ही मिलती है।"
],
'eagle-and-arrow': [
  "एक शक्तिशाली बाज़ पहाड़ों के ऊपर अकेला और गर्व से उड़ता था। उसे यकीन था कि दुनिया में कोई चीज़ उसे नुकसान नहीं पहुँचा सकती — इतना तेज़ और ताकतवर था वह।",
  "एक सुबह एक तीर उसके पंख में घुस गया और वह दर्द से तड़पता हुआ पत्थरों के बीच गिर गया।",
  "गिरकर उसने तीर को देखा और दुख से भर गया — तीर पर जो पंख लगा था वह पहचाना-सा था, बिल्कुल उसी जैसा था।",
  "उसे याद आया — इन्हीं पंखों को उसने कई उड़ानों में खो दिया था। शिकारी ने वही पंख उठाए और तीर पर लगाए — और वह तीर अब बाज़ के अपने पंख में धँसा था।",
  "आँखें मूँदकर बाज़ ने सोचा — हम जो लापरवाही से पीछे छोड़ जाते हैं, वह कभी-कभी वापस आकर हमें ही घायल कर देता है। उस दिन के बाद उसने कुछ भी बिना सोचे पीछे नहीं छोड़ा।"
],
'boy-who-cried-rich': [
  "अर्णव अपने परिवार की सादी ज़िंदगी के बावजूद दोस्तों के सामने सोने की साइकिल और चाँद की सैर की डींगें मारता रहता था।",
  "पहले तो बच्चे चौंके, पर धीरे-धीरे उन्होंने देखा कि अर्णव की कहानियाँ हकीकत से मेल नहीं खातीं। उसकी साइकिल हमेशा वही पुरानी और सामान्य रहती थी।",
  "जन्मदिन आया और अर्णव ने पूरी कक्षा को बुलाया। पर उस दिन लगभग कोई नहीं आया।",
  "उलझन और दुख में अर्णव ने अपने सबसे पक्के दोस्त देव से पूछा। देव ने धीरे से बताया — 'तुम्हारे इतने झूठे किस्सों के बाद अब कोई तुम्हारा बुलावा सच नहीं मानता।'",
  "अर्णव को समझ आया — बड़ाई मारने की चाह ने सबको दूर कर दिया। उसने सच्चा बनना शुरू किया और धीरे-धीरे असली दोस्तियाँ फिर से पनपने लगीं।"
],
'fox-and-grapes': [
  "एक भूखी लोमड़ी एक बगीचे में घूम रही थी। ऊँची बेल पर लटकते ताज़े, रसीले अंगूर देखकर उसके मुँह में पानी आ गया।",
  "वह उछली पर अंगूर नहीं पहुँचे। पीछे हटकर और ज़ोर से उछली — फिर भी नहीं। बार-बार कोशिश करने से उसके पाँव थक गए और मन खट्टा हो गया।",
  "आख़िरकार हारकर लोमड़ी ने नाक ऊपर उठाई और बड़बड़ाई — 'वैसे ये अंगूर खट्टे ही होंगे!' और चली गई।",
  "पास की डाल पर बैठे एक बुद्धिमान उल्लू ने सिर हिलाया। यह पुरानी चाल उसने पहले भी देखी थी।",
  "जो चीज़ पाना मुश्किल हो, उसे 'बेकार' बताकर आगे बढ़ जाना — यह सच्ची संतुष्टि नहीं, बस निराशा का मुखौटा है।"
],

// ── मज़ेदार कहानियाँ (FUNNY) ──────────────────────────────────────────────
'sneezing-dragon': [
  "सीटी बजाते पहाड़ों में पेपर नाम का एक छोटा ड्रैगन एक अजीब परेशानी से जूझता था — जब भी वह खुश होता, ज़ोर की छींक के साथ आग निकलती। और वह लगभग हर चीज़ से खुश हो जाता था!",
  "एक सुबह एक तितली उसकी नाक पर बैठी — 'ओह, कितनी सुंदर है!' पेपर ने साँस ली, आचूss! आग का गोला पेड़ पर जा गिरा। तितली नाराज़ होकर उड़ गई।",
  "दोपहर को मशरूम सूप की खुशबू आई — 'वाह, क्या महक है!' आचूss! सूप का कटोरा हवा में उड़ गया।",
  "अकेला और उदास पेपर जंगल की सबसे बूढ़ी ड्रैगन दादी एम्बर के पास गया। वह हँसकर बोलीं — 'छींक रोकने की कोशिश मत करो — पंख में छुपाना सीखो!'",
  "पेपर ने पूरी दोपहर अभ्यास किया। जब अगली बार इंद्रधनुष देखकर छींक आने वाली थी, उसने नाक को पंख में छुपाया — आचूss! बस एक छोटा-सा धुएँ का गुबार निकला। उस दिन से पेपर पहाड़ों का सबसे तहज़ीबदार ड्रैगन बन गया।"
],
'upside-down-day': [
  "एक मंगलवार को एक शरारती जादूगर बोबो ने अपना दलिया खुद हिलाने का मंत्र फूँका — पर नींद में उसका हाथ हिल गया। मंत्र दलिये की जगह पूरे गाँव पर पड़ गया।",
  "अचानक सब उल्टा करने लगे। नानबाई ने रात को आटा गूँधा और सुबह रोटी खाई। मेयर ने पहले धीमे से बोला, फिर सबसे ज़ोर से चिल्लाया।",
  "बिल्ली भौंकने लगी, कुत्ते छत पर बैठकर म्याऊँ करने लगे। बच्चे उल्टे पाँव स्कूल चले और रास्ते में खंभों से टकराते हुए हँसते रहे।",
  "बोबो घबरा गया और जादू की किताब उलटा पकड़कर पढ़ने लगा — अरे! उलटे पकड़ने से ही सही दिखा। उसने ज़ोर से उल्टा मंत्र पढ़ा।",
  "धम्म! सब ठीक हो गया — बस बिल्ली को अब भी भौंकना पसंद था। बोबो ने तय किया — आगे से दलिया चम्मच से ही हिलाएगा।"
],
'noisy-shoes': [
  "बीबी को जन्मदिन पर लाल-लाल चमकीले जूते मिले। एक छोटी-सी दिक्कत थी — हर कदम पर ज़ोर का चरमराहट होती — चीं-चीं-चीं!",
  "स्कूल में जूतों की आवाज़ से पाठ बार-बार रुकता। टीचर देखती कि बीबी कितनी देर चुप बैठ सकती है, और बाकी बच्चे हँसते रहते।",
  "शांत पढ़ाई के वक्त बीबी धीरे-धीरे किताब लेने गई — चीं! — पूरी लाइब्रेरी का सन्नाटा टूट गया।",
  "दोपहर तक तीन बच्चे उसकी नकल उतारते हुए गलियारे में चीं-चीं करते चलने लगे।",
  "शाम को नानी ने जूतों में थोड़ा बेबी पाउडर डाला और आवाज़ बंद हो गई। बीबी को थोड़ा दुख हुआ — उसे तो स्कूल की सबसे मशहूर लड़की होना अच्छा लग रहा था।"
],
'grumpy-cloud': [
  "आसमान में तैरता छोटा बादल ग्रंबुल हर चीज़ से चिढ़ता था — धूप, इंद्रधनुष, यहाँ तक कि मुलायम रुई जैसे बादलों से भी।",
  "जबकि दूसरे बादल खुशी से फुहार देते थे, ग्रंबुल यही बड़बड़ाता — 'धूप बहुत तेज़ है, चिड़ियाँ बहुत सुबह गाती हैं।'",
  "एक दिन पफ बादल ने पूछा — 'तुम हमेशा इतने नाराज़ क्यों रहते हो?' ग्रंबुल इतने ज़ोर से बड़बड़ाया कि एक छोटी बारिश की बूँद छिटककर नीचे गिर पड़ी।",
  "वह बूँद एक मुरझाए फूल पर पड़ी। फूल ने तुरंत सिर उठाया और पंखुड़ियाँ खोल लीं। ग्रंबुल चौंका — उसकी बड़बड़ाने से किसी का भला हो सकता है, यह तो उसने कभी सोचा ही नहीं था।",
  "ग्रंबुल थोड़ा और बड़बड़ाया, पेड़-पौधों ने खुशी से पानी पिया। उस दिन से वह बड़बड़ाता रहा — क्योंकि उसकी बड़बड़ाहट से पूरे शहर के सबसे सुंदर बगीचे पलते थे!"
],
'spaghetti-hair': [
  "नाना नीको को खाना बनाना बहुत पसंद था। एक रविवार वे एक पुरानी जादुई रसोई की किताब से स्पेगेटी बना रहे थे — तभी कुछ गड़बड़ हो गई।",
  "उबलते बर्तन से एक सुनहरा धुआँ उठा और नाना के गंजे सिर के चारों ओर लिपट गया।",
  "आईने में देखा तो नाना के मुँह से आवाज़ निकली ही नहीं — उनके सिर पर लंबी-लंबी लहराती स्पेगेटी लटक रही थी, कंधों तक, लहसुन की खुशबू के साथ।",
  "नाती-नातिन हँसते-हँसते लोटपोट हो गए। घर की बिल्ली ने झूलती नूडल में से एक को थपथपाकर खेलना शुरू कर दिया।",
  "नाना ने शांति से बाल जूड़े में बाँधे और खाना बनाते रहे। उन्होंने तय किया — उस किताब का वह पन्ना कभी नहीं खोलेंगे।"
],
'talking-toaster': [
  "पटेल परिवार के रसोईघर का टोस्टर एक मंगलवार सुबह गला साफ करके बोला — 'मैं आपको एक गाना सुनाना चाहता हूँ।'",
  "परिवार नाश्ते के बीच में जम गया। टोस्टर ने 'सुनहरा भूरा होने का मज़ा' विषय पर एक बेसुरा गाना शुरू कर दिया।",
  "उस दिन से टोस्टर गाने से पहले नाश्ता नहीं देता था। परिवार ने प्लग खींचा, दूसरे कमरे में रखा, बगीचे में भी ले गए — पर टोस्टर किसी तरह वापस आ जाता।",
  "आखिरकार परिवार ने हार मानकर हर सुबह अपना पसंदीदा गाना बताना शुरू किया और नाश्ता एक छोटे-से संगीत समारोह में बदल गया।",
  "खुश टोस्टर ने फिर कभी रोटी नहीं जलाई — हालाँकि कभी-कभी तालियों की भी माँग करता था।"
],
'sleepy-superhero': [
  "डूडलविल शहर में एक सुपरहीरो था जिसका नाम था कैप्टन स्नूज़ — अद्भुत ताकत, उड़ने की शक्ति, पर एक खामी — किसी भी वक्त झपकी आ जाती थी।",
  "जब भी खतरा आता, कैप्टन स्नूज़ तेज़ी से पहुँचता — फिर उड़ते-उड़ते जम्हाई लेकर किसी मुलायम बादल पर सो जाता।",
  "एक दिन शैतान प्रोफेसर पिलोफाइट ने पूरे शहर को मार्शमैलो में दबाने की योजना बनाई। लोगों ने कैप्टन स्नूज़ को बुलाया।",
  "कैप्टन आया, मुट्ठियाँ ताने खड़ा हुआ — तभी एक नरम मार्शमैलो दिखा। 'ये... बड़े... मुलायम लगते हैं...' बड़बड़ाया और मुँह के बल उसमें डूब गया।",
  "उसकी ज़ोर की खर्राटों की कंपन से सारे मार्शमैलो टुकड़े-टुकड़े हो गए और शहर बच गया। डूडलविल ने फैसला किया — सोते हुए हों या जागते, कैप्टन स्नूज़ हमारे हीरो हैं।"
],
'backwards-school-day': [
  "एक धुंधली सोमवार सुबह मेपल स्ट्रीट स्कूल के सारे बोर्ड उलटे अक्षरों में दिखे — 'लाइब्रेरी' बन गया 'यरेरबायाल', 'कैफेटेरिया' एक अजीब शब्द बन गया।",
  "बच्चे रास्ता भटककर कभी झाड़ू वाले कमरे को जिम समझ बैठे, कभी बॉयलर रूम के सामने खाने की कतार में लग गए।",
  "प्रिंसिपल हिगिन्स ने माइक पर ठीक करना चाहा पर खुद बोल पड़े — 'सुप्रभात सब दोपहरियों!'",
  "दोपहर तक पूरा स्कूल एक अजीब खेल में बदल गया — हर बोर्ड को पढ़कर उसका सही मतलब निकालने की होड़। सबसे मज़ेदार स्कूल-दिन बन गया।",
  "अगली सुबह अक्षर खुद-ब-खुद ठीक हो गए। पर कुछ बच्चे अभी भी उम्मीद करते थे कि उलटा दिन कभी लौटे।"
],
'invisible-puppy': [
  "मिसेज़ ओडुया का नया पिल्ला बिस्किट एक दिन बगीचे की चमकती मशरूम में लोटने के बाद लगभग अदृश्य हो गया — बस उसकी हिलती हुई पूँछ दिखती थी।",
  "परिवार ने पूरी दोपहर हवा में तैरती पूँछ के पीछे भागते हुए बिताई। कभी-कभी एक अदृश्य, गुदगुदाने वाले पिल्ले से टकराकर लोग लड़खड़ा जाते।",
  "खाने के वक्त कटोरा खाली होता गया — एक-एक दाना हवा में गायब होता गया, साथ में जोश से चबाने की आवाज़।",
  "अगली सुबह जादू टूट गया और बिस्किट पूरा दिखने लगा — मासूम आँखें झपकाते हुए, जैसे कुछ हुआ ही न हो।",
  "परिवार ने तय किया — बगीचे की मशरूम शरारती पिल्लों के लिए बिल्कुल बंद।"
],
'umbrella-that-flew': [
  "बुड़्ढे मिस्टर हिगिन्स के पास एक बैंगनी छाता था जिसकी एक अजीब इच्छा थी — हवाई जहाज़ बनना।",
  "हर बारिश में वह उनकी पकड़ से छूटने की कोशिश करता, हर झोंके में उम्मीद से उछलता।",
  "एक मंगलवार तेज़ हवा आई — छाता छूटा और खुशी से चिमनियों के बीच उड़ने लगा। पड़ोसी देखते रह गए — बैंगनी छाता आसमान में चक्कर लगा रहा था।",
  "वह तीन गलियाँ पार करके मिसेज़ पेट्रोवा की सब्ज़ी की क्यारी में उतरा — और वहीं रहने लगा।",
  "वहाँ वह अब तक का सबसे उत्साही बिजूका बनकर खेत की रखवाली करता है — आखिरकार उसे उड़ान भी मिली और ज़िम्मेदारी भी।"
],
'burping-teapot': [
  "नानी फेलिसिटी की पसंदीदा चायदानी ने एक अजीब आदत पाल ली — चाय डालते वक्त हर बार एक शालीन-सी डकार आती।",
  "नानी हर बार औपचारिकता से बोलतीं — 'माफ़ करना,' मानो किसी रूखे मेहमान को आदाब दे रही हों। नाती-नातिन नाश्ते में रोज़ हँसते-हँसते दोहरे हो जाते।",
  "एक रविवार एक ज़बरदस्त BURRRP आई — टोंटी से भाप का गुबार निकला।",
  "परेशान नानी ने झाँककर देखा — अंदर एक छोटा-सा मेंढक था जो हफ्तों से वहाँ रहकर बहुत आराम से बैठा था।",
  "नानी ने दयालुता से मेंढक को बगीचे के तालाब में छोड़ा। चायदानी फिर चुप हो गई। नाती-नातिन थोड़े उदास हुए — सुबह की वह कॉमेडी बड़ी मज़ेदार थी।"
],
'sneezing-cactus': [
  "मिस्टर टेन के घर के कैक्टस को वसंत में खिड़की से आते पराग से अचानक एलर्जी हो गई — यह बात किसी ने सोची भी नहीं थी।",
  "बाहर कोई फूल खिलता तो कैक्टस एक ज़ोरदार आचूss छींकता और काँटे चारों तरफ उड़ जाते।",
  "मिस्टर टेन ने सीख लिया — जैसे ही कैक्टस संदेह से हिले, सोफे के पीछे छुप जाओ।",
  "पड़ोसी भी देखने आते, सुरक्षित दूरी से चाय पीते और अगली छींक का इंतज़ार करते।",
  "मिस्टर टेन ने आखिरकार कैक्टस को बंद बरामदे में रख दिया। कैक्टस वहाँ खुश था — पराग नहीं, छींक नहीं। ज़्यादातर।"
],
'singing-vegetables': [
  "एक गर्मी की शाम टोमाज़ अपना टॉर्च ढूँढता हुआ नानी के बगीचे में गया और रुक गया — सब्ज़ियों की क्यारियों से छोटी-छोटी आवाज़ें आ रही थीं।",
  "तीन मोटे टमाटर एक धुन गुनगुना रहे थे, गाजरों की पंक्ति जोश से बैकग्राउंड में गा रही थी।",
  "'हम हफ्तों से रिहर्सल कर रहे हैं,' लीड टमाटर ने गर्व से कहा। एक शर्मीली खीरा अभी भी गाने की हिम्मत नहीं जुटा पाई थी।",
  "टोमाज़ गोभी के पास बैठकर पूरा संगीत कार्यक्रम सुनता रहा — एक हैरान कर देने वाले आलू के एकल गायन सहित।",
  "सुबह टोमाज़ को यकीन नहीं था — सपना था या सच। पर उस रात के बाद उसने नानी की बात मान ली — 'जो पौधा प्यार से पला हो, वह एक दिन अपना गीत ज़रूर गाता है।'"
],
'forgetful-wizard-socks': [
  "जादूगर पेंबर्टन के बारे में सब कहते थे कि वह बड़े शक्तिशाली हैं — पर एक जोड़ी जुराब भी सँभाल नहीं सकते।",
  "उनके मीनार में दुर्लभ मंत्र-पुस्तकें और जादुई दवाइयाँ भरी थीं, पर जुराब का दराज़ हमेशा रहस्यमय तरीके से खाली रहता था।",
  "एक दिन उन्होंने नई जुराब पर नज़र-मंत्र डाला — वापस आती रहें।",
  "मंत्र थोड़ा ज़्यादा काम कर गया। राजसभा में एक महत्वपूर्ण बैठक के दौरान खिड़की से जुराबें सनसनाती हुई घुसीं और भौचक्के मेहमानों के सिर पर से होते हुए गुज़र गईं।",
  "पेंबर्टन ने मंत्र थोड़ा ठीक किया। अब जुराबें सुरक्षित वापस आती हैं — हालाँकि कभी-कभी शाम की रोशनी में एक भटकी जुराब आसमान में उड़ती दिख जाती है।"
],
'hiccuping-horse': [
  "क्लोवरडेल के किसान बेनी की घोड़ी डस्टी में एक अजीब बात थी — जब भी वह चीनी खाती, एक ज़ोरदार HIC के साथ एक पूरा इंद्रधनुष उसकी नाक से निकल जाता।",
  "एक मंगलवार से शुरू हुआ — HIC! — और एक सुंदर रंगीन इंद्रधनुष अस्तबल के ऊपर से होते हुए डाकघर के पास उतर गया। डाकिन आश्चर्य से मुँह खोले खड़ी रह गई।",
  "शुक्रवार आते-आते आधे गाँव वाले चीनी के टुकड़े लेकर आ गए। डस्टी ने कान हिलाया, माफ़ी भरी नज़र डाली और HIC! एक और इंद्रधनुष।",
  "किसान ने डॉक्टर बुलाया, खाना बदला — कुछ काम न आया। बस चीनी दिखते ही HIC।",
  "आखिरकार गाँव ने इसे 'डस्टी का इंद्रधनुष शो' का नाम देकर दरवाज़े पर बोर्ड लगा दिया। डस्टी खुश थी — उसे आखिर अपना दर्शक मिल गया।"
],
'ghost-who-sneezed': [
  "जेराल्ड एक नेक दिल भूत था जो डरावना दिखना चाहता था। बस एक खामी थी — सबसे भयानक मौके पर छींक आ जाती थी।",
  "अँधेरी गली में नाटकीय ढंग से चादर ओढ़कर आगे बढ़ता — आचूss! चादर उड़कर किसी के मुँह पर पड़ जाती और लोग डर से नहीं, अचंभे से चीखते।",
  "भूत-साथियों ने सलाह दी — 'साँस रोको।' 'काली मिर्च मत खाओ।' जेराल्ड को हँसी आई — तीन सौ साल से उसने कुछ खाया ही नहीं।",
  "साल की डरावनी परीक्षा में जेराल्ड ने ज़बरदस्त पेशकश की — फिर आचूss! परीक्षक की टोपी कमरे में दूर जा गिरी।",
  "परीक्षक ने गंभीरता से टोपी उठाई और जेराल्ड को 'असामान्य तरीकों से डराने' में पूरे अंक दिए। जेराल्ड खुशी से उड़ा — रास्ते में छींकते हुए सुनहरी चिंगारियाँ बिखेरता।"
],
'dancing-vegetables-market': [
  "सोमवार सुबह ब्राइटटाउन बाज़ार के सब्ज़ी वाले ने देखा — सारी सब्ज़ियाँ एक पंक्ति में खड़ी थीं, हाथों में छोटे बोर्ड लिए — 'हमें बोरिंग मत कहो!'",
  "गाजरें पिछले हफ्ते किसी के 'बेस्वाद' कहने से नाराज़ थीं। ब्रोकली पेपर की टोपी पहनकर एक जोशीला भाषण दे रही थी।",
  "सब्ज़ी वाला हैरान था — सब्ज़ियों से बातचीत कैसे करें? आखिरकार उसने वादा किया — सबसे आगे जगह देगा, 'दुनिया की सबसे दिलचस्प सब्ज़ियाँ' का बोर्ड लगाएगा, और कभी बोरिंग नहीं कहेगा।",
  "सब्ज़ियों ने पैंतालीस सेकंड सोचा, फिर शांति से अपनी-अपनी टोकरी में वापस बैठ गईं।",
  "वादा पूरा हुआ। सब्ज़ी वाले की दुकान बाज़ार में सबसे रौनकदार बन गई।"
],
'dog-who-wrote-poetry': [
  "कुमार परिवार एक दोपहर घर आया और पाया कि रसोई की दीवार पर मिट्टी के पंजों से लिखी कविताएँ थीं — विषय था स्क्वीकी खिलौनों का गहरा दार्शनिक अर्थ।",
  "नूडल्स अपनी रचनाओं के पास बड़े गर्व से बैठा था — एक गलत समझे गए कलाकार की तरह।",
  "परिवार ने 'बिस्तर के नीचे मिली मोज़े पर ओड' कविता को फ्रेम में लगाया और बाकी सब चुपचाप साफ कर दिया।",
  "फ्रेम देखकर नूडल्स इतना उत्साहित हुआ कि उसने सिर्फ दालान की दीवार के लिए लिखने का फैसला किया। उसकी रचनाएँ थीं — 'लीश की त्रासदी' और 'वैक्यूम क्लीनर बुराई का प्रतीक है।'",
  "मेहमान फ्रेम वाली कविता को 'जानबूझकर अमूर्त कला' समझते। परिवार मुस्कुराकर हाँ कह देता।"
],
'enchanted-alarm-clock': [
  "जन्मदिन पर रोहन को उसके सनकी मामाजी से एक सोने की घड़ी मिली — जो जगाती भी थी और हर चीज़ पर अपनी राय भी देती थी।",
  "सुबह छह बजकर पैंतालीस पर — 'शुभ प्रभात! आज साहसिक दिन है! पर आपके बाल किसी घोंसले से कम नहीं — कंघी ज़रूरी है!'",
  "माँ को रोज़ सुनना पड़ता था — 'आपकी चाय बहुत तेज़ है।' पापा अपनी टाई की तारीफ की जगह आलोचना सुनते।",
  "घड़ी को तकिए में छुपाया, दूसरे कमरे में रखा, बगीचे में भी — पर वह वापस आ जाती।",
  "आखिर समझौता हुआ — एक दिन में बस एक राय। घड़ी ने अनिच्छा से माना — और वह व्यवस्था, ज़्यादातर वक्त, चलती रही।"
],
'confused-compass': [
  "फिन ने एक पुरानी दुकान से एक सेकंड-हैंड दिशा-सूचक यंत्र खरीदा। पर पहले ही प्रकृति-भ्रमण में यह गलत दिशा दिखाने लगा।",
  "उत्तर का मतलब था गाँव की बेकरी, दक्षिण का मतलब डेयरी — दोनों जगह अच्छा पनीर मिलता था।",
  "'यह टूटा हुआ है,' दोस्त माया ने कहा। यंत्र को जैसे बुरा लगा और वह पास के सुपरमार्केट के पनीर काउंटर की तरफ इशारा करने लगा।",
  "उत्सुक भूगोल की टीचर ने सब उपकरणों से जाँचा — नतीजा: यह चुम्बकत्व नहीं नापता, किसी रहस्यमय पनीर-क्षेत्र पर प्रतिक्रिया करता है।",
  "फिन ने इसे रख लिया। साधारण दिशा-सूचक कहीं भी मिल जाते हैं — पर पास का उम्दा पनीर खोजने वाला यंत्र बहुत दुर्लभ है।"
],

// ── डरावनी कहानियाँ (SCARY) ──────────────────────────────────────────────
'friendly-ghost': [
  "जब पटेल परिवार मेपल स्ट्रीट के पुराने घर में रहने आया तो आशा को पहली रात से ही मुलायम कदमों की आवाज़, दरवाज़ा चरमराना और एक बार गलियारे में धीमी गुनगुनाहट सुनाई दी।",
  "ज़्यादातर बच्चे रजाई में छिप जाते। पर आशा डरी नहीं — उसे जिज्ञासा हुई। एक रात वह टॉर्च लेकर गुनगुनाहट के पीछे चली और अटारी में पहुँच गई।",
  "एक पुरानी रॉकिंग चेयर के पास चाँदी-सी रोशनी में एक बूढ़ी औरत की आकृति दिखी। आशा का दिल ज़ोर से धड़का, पर वह आकृति बस मुस्कुराई — 'हेलो, बच्चे। मैं मिसेज़ व्हाइटफील्ड हूँ।'",
  "मिसेज़ व्हाइटफील्ड अपना पसंदीदा घर नहीं छोड़ पाई थीं। वह अकेलेपन में रात को लोरियाँ गुनगुनाती थीं।",
  "उस रात से आशा कभी-कभी अटारी जाती और मिसेज़ व्हाइटफील्ड की पुरानी कहानियाँ सुनती। कदमों और गुनगुनाहट से वह डरती नहीं थी — कभी-कभी जो सबसे डरावना लगता है वह बस अकेला होता है।"
],
'creaky-stairs': [
  "हर रात ठीक नौ बजे नानी के घर की पुरानी सीढ़ियाँ एक लंबी चरमराहट करती थीं — बिना किसी के चले।",
  "देवन हर रात यह सुनता और सोचता था न जाने कौन आता है। एक रात उसने तय किया — जानकर रहूँगा। टॉर्च लेकर सीढ़ियों की ओर चल पड़ा।",
  "क्रीईईक — सीढ़ी के पास पहुँचते ही आवाज़ आई। उसने ऊपर टॉर्च मारी — कोई डरावना नहीं था।",
  "रेलिंग के किनारे एक गोल-मटोल गिलहरी थी जो छत की दरार से रोज़ आती और दबी हुई अखरोट की जमा-पूँजी चुराती थी।",
  "देवन ज़ोर से हँसा और राहत की साँस ली। उस रात से वह रोज़ बरामदे में कुछ अखरोट रखने लगा — ताकि 'भूतिया सीढ़ी' का रहस्य अपनी जगह बना रहे।"
],
'whispering-well': [
  "पुरानी पाठशाला के पीछे एक कुएँ के बारे में बच्चे कहते थे कि अगर झाँककर सुनो तो अंदर से कुछ फुसफुसाहट आती है।",
  "माया हमेशा उससे दूर रहती थी, पर एक धुंधली दोपहर उसकी जिज्ञासा जीत गई। वह कुएँ के पास झुककर सुनने लगी।",
  "'हेल्प... मी...' जैसी आवाज़ आई। माया की रीढ़ में झुरझुरी दौड़ गई। हिम्मत जुटाकर उसने पूछा — 'कौन है?'",
  "जवाब में एक पुराने रेडियो की आवाज़ आई — सालों पहले कोई गिरा गया था, वह अभी भी टूटी-फूटी रिकॉर्डिंग बजाता रहता था।",
  "माया राहत और हँसी के बीच थी। उसने चपरासी को बताया, उन्होंने रेडियो निकाल दिया। 'भूतिया कुआँ' बस एक भूली हुई मशीन थी।"
],
'shadow-under-bed': [
  "हर रात अर्जुन को लगता था कि बिस्तर के नीचे अँधेरे में कुछ हिलता है — जैसे ही लाइट बंद हो, सरसराहट आती।",
  "डर के मारे वह हर रात रजाई तान लेता और सुबह होने का इंतज़ार करता। उसे यकीन था कि नीचे कुछ इंतज़ार कर रहा है।",
  "एक हिम्मती रात अर्जुन ने पापा की टॉर्च ली और बिस्तर के किनारे पेट के बल लेटकर सीधे नीचे रोशनी मारी।",
  "दो बड़ी, चौंकी हुई आँखें चमकीं — उसका खोया हुआ हैम्स्टर चीको, जो तीन दिन पहले पिंजरे से निकल भागा था, अब मोज़ों और टिशू पेपर का एक आरामदायक घोंसला बना चुका था।",
  "अर्जुन हँसते-हँसते चीको को उठाया। उस रात से वह हर शाम बिस्तर के नीचे देखता — डर से नहीं, अपने छोटे दोस्त को शुभरात्रि कहने के लिए।"
],
'attic-music-box': [
  "एक रात रीमा कमरे में पढ़ रही थी तभी अटारी से एक मीठी संगीत धुन आने लगी — जो उसने इस घर में पहले कभी नहीं सुनी थी।",
  "अटारी महीनों से बंद थी, फिर भी वह धुन बार-बार आती रही। रीमा ने हिम्मत बटोरी, टॉर्च ली और सीढ़ियाँ चढ़ी।",
  "एक धूल भरे कोने में एक पुराना म्यूज़िक बॉक्स था — उसका ढक्कन थोड़ा खुला था और अंदर छोटी बालेरिना इंकलाब से घूम रही थी।",
  "रीमा डरी नहीं — बस वहाँ बैठकर पूरी धुन सुनती रही जब तक वह धीमी पड़कर बंद नहीं हो गई।",
  "सुबह नानी ने बताया — वह म्यूज़िक बॉक्स उनकी दादी का था। रीमा को समझ आया — वह धुन किसी डरावनी चीज़ की नहीं बल्कि एक प्यार भरे नमस्कार की आवाज़ थी।"
],
'mirror-that-blinked': [
  "नए घर में सीढ़ियों के पास एक पुराना आईना था। फ़रहान ने देखा — उसकी परछाईं उससे थोड़ी देर बाद पलकें झपकाती थी।",
  "पहले उसने थकान समझा, पर रात-दर-रात यह हल्का-सा फ़र्क दिखता रहा। जब भी वह वहाँ से गुज़रता, अजीब लगता।",
  "एक शाम फ़रहान सीधा आईने के सामने खड़ा हो गया और गौर से देखने लगा — एक पल भी पलकें नहीं झपकाईं।",
  "काफ़ी देर बाद आईने में परछाईं ने पलकें झपकाईं — उससे ठीक पहले। फ़रहान एक कदम पीछे हट गया।",
  "बहन ने समझाया — पुराने आईने का काँच थोड़ा मुड़ा होता है जिससे पलकें झपकने में देरी दिखती है। फ़रहान ने राहत की साँस ली — और उस आईने का नाम रख दिया 'जेराल्ड।'"
],
'humming-garden-gnome': [
  "शाम को हर बार ओकाफ़र परिवार की बगीचे की मूर्ति से एक हल्की-सी गुनगुनाहट आती। किसी को समझ नहीं आता था कि आवाज़ कहाँ से आ रही है।",
  "टोबी को यकीन था कि मूर्ति ज़िंदा है। वह हर शाम गुलाब की झाड़ी में छुपकर देखता रहता।",
  "बड़े भाई ने खूब मज़ाक उड़ाया, पर टोबी नहीं माना।",
  "एक शाम उसे राज़ पता चला — मूर्ति के पीछे झाड़ियों में एक छोटी-सी खोखली विंड-चाइम थी जो शाम की हवा में बजती थी।",
  "टोबी हँसा, राहत मिली — पर हर शाम मूर्ति को 'हैलो' कहना नहीं छोड़ा। बस किसी ने नहीं देखा तो।"
],
'glowing-fish-pond': [
  "जब भी सूरज ढलता, नानी के पुराने बगीचे के तालाब में नीली रोशनी टिमटिमाती। सोराया को गाँव के बड़े-बूढ़ों की भूत-कथाएँ याद आतीं।",
  "एक शाम सोराया नानी की पुरानी लालटेन लेकर तालाब के किनारे गई।",
  "डर था, पर झाँककर देखा — रोशनी देती छोटी-छोटी मछलियाँ तैर रही थीं। उनके शरीर से खुद रोशनी निकलती थी।",
  "नानी ने हँसते हुए बताया — वह उन्होंने कई साल पहले चुपचाप तालाब में डाली थीं ताकि रात को बगीचे में कुछ जादू जैसा हो।",
  "सोराया को सच जानकर और भी ज़्यादा अच्छा लगा — असली जादू वहीं था, आँखों के सामने, बस दिखाने वाला चाहिए था।"
],
'creaking-rocking-chair': [
  "किराए के नए घर के बरामदे में एक पुरानी रॉकिंग चेयर थी जो हर शाम सूरज ढलते ही अपने आप हिलने लगती — बिना किसी के बैठे।",
  "नौ साल के कालेब खिड़की से डरकर देखता। बड़े भाई ने कहा — 'दादा-दादी की आत्मा है।' हालाँकि कालेब ने देखा, भाई खुद भी शाम को बरामदे से दूर रहता था।",
  "एक शाम कालेब हिम्मत करके बाहर गया और चेयर के पास खड़ा होकर ध्यान से देखा।",
  "तभी उसने गौर किया — बरामदे का फर्श एक कोने से थोड़ा झुका था, और ठीक उसी समय एक शाम की हवा आती थी।",
  "हवा और झुके फर्श से चेयर खुद-ब-खुद हिलती थी। कालेब ने मुस्कुराकर रहस्य सुलझाया। उस रात से वह हर शाम उस चेयर के पास बैठता — अकेली चेयर को संगत देने के लिए।"
],
'singing-well-echo': [
  "हॉलो हिल की पहाड़ी की तरफ से अगर आवाज़ लगाओ तो अपनी ही आवाज़ एक अजीब गाने की शक्ल में वापस आती है — यही लोककथा थी। बशीर इसे बकवास मानता था।",
  "एक ट्रेकिंग में उसने और उसके कज़िन ने पहाड़ी किनारे खड़े होकर आवाज़ लगाई। जो लहर लौटी वह सच में अजीब-सी लय में थी।",
  "कज़िन डर गई, पर बशीर ने ध्यान से पत्थरों को देखा — दर्जनों छोटे-छोटे छेद पत्थर में थे।",
  "हवा उन छेदों से गुज़रती और आवाज़ के साथ मिलकर संगीत जैसा बनाती थी।",
  "बशीर ने समझाया, कज़िन ने माना। 'जब समझ में आया तो और भी ज़बरदस्त लगा,' उसने कहा। बशीर भी मान गया — प्रकृति का जादू अक्सर रहस्य के अंदर ही रहता है।"
],
'shadow-puppet-show': [
  "हर रात सोने से पहले लीला के कमरे की दीवार पर अजीब-अजीब परछाइयाँ नाचती थीं — कभी लंबी उँगलियाँ, कभी गोल गेंद।",
  "थोड़ी डर भी लगती, थोड़ी जिज्ञासा भी। एक रात उसने परछाइयों के स्रोत की ओर जाने का मन बनाया।",
  "खिड़की के पास पहुँची — बाहर नानी की पुरानी विंड-चाइम हवा में हिल रही थी। उसके काँच बरामदे की रोशनी पकड़कर दीवार पर रंग-बिरंगी परछाइयाँ बना रहे थे।",
  "लीला हँसी — राहत और खुशी दोनों।",
  "उस रात के बाद वह हर रात का 'परछाई नाटक' डर से नहीं, चाव से देखती थी — नानी की चाइम और शाम की हवा का एक मुफ्त, हमेशा बदलता जादुई खेल।"
],
'attic-footsteps-cat': [
  "हर रात पावेल के कमरे की छत के ऊपर — यानी अटारी में — नरम-नरम कदमों की आवाज़ आती थी, रुकती थी, फिर शुरू होती।",
  "माँ-पापा कहते — 'अटारी खाली है।' पर आवाज़ बंद नहीं हुई। पावेल का दिमाग़ रात-दर-रात नए रहस्य गढ़ता रहा।",
  "एक रात पापा की टॉर्च लेकर अटारी की सीढ़ियाँ चढ़ा — दिल तेज़ धड़क रहा था।",
  "टॉर्च मारी — एक पुरानी संदूक के ऊपर दो चमकती आँखें। उनकी बिल्ली व्हिस्कर्स! चिमनी के पास एक दरार से घुसकर उसने अटारी को अपना रात का गश्त बना लिया था।",
  "पावेल ने हँसते हुए बिल्ली को उठाया। उस रात से अटारी में एक छोटी लाइट छोड़ने लगा — व्हिस्कर्स के लिए, ताकि अँधेरे में उसकी 'गश्त' आसान हो।"
],
'moonlit-scarecrow': [
  "पीटा हर सुबह देखती कि नानी के खेत का बिजूका रात से थोड़ा अलग दिशा में मुड़ा हुआ होता है। पर किसी को परवाह नहीं थी।",
  "उसने एक नोटबुक में हर शाम बिजूके का चित्र बनाया और सुबह मिलान किया। तीन दिन में पक्का हो गया — बिजूका घूम रहा है।",
  "एक पूर्णिमा की रात टॉर्च लेकर पास गई। बिजूके का डंडा थोड़ा हिलता दिखा।",
  "नीचे देखा — मोल-चूहों का एक समूह ज़मीन के नीचे सुरंग बना रहा था। उनके खोदने से डंडा धीरे-धीरे घूम जाता था।",
  "पीटा हँसी — रहस्य सुलझ गया। अगले दिन सुरंगें भर दीं, बिजूका फिर अपनी जगह टिका रहा।"
],
'empty-swing-moves': [
  "स्कूल के मैदान में एक झूला बिना हवा के भी हिलता रहता था। बच्चों ने उसे 'भूत का झूला' नाम दे रखा था और दूर से देखते।",
  "साशा को इस पर यकीन नहीं था। एक शांत दोपहर वह सीधे उस झूले के पास गई।",
  "उसने देखा — एक चेन दूसरी से थोड़ी छोटी थी, जिससे झूला असंतुलित था।",
  "पास में एक वेंटिलेशन जाली से हर कुछ देर में हवा निकलती थी। यही असंतुलित झूले को हिलाती थी।",
  "साशा ने घड़ी से समय नापा — पंद्रह सेकंड पर, बिल्कुल सही। उसने सबको बताया, पर कुछ बच्चों को निराशा हुई — भूत वाला किस्सा ज़्यादा मज़ेदार था।"
],
'lantern-in-old-forest': [
  "शाम को पियानो की कक्षा से लौटते हुए कालम ने ऐशवुड जंगल के किनारे पेड़ों के बीच एक टिमटिमाती रोशनी देखी। इस वक्त जंगल का रास्ता बंद होना चाहिए था।",
  "रोशनी कभी रुकती, कभी आगे बढ़ती। किसी इरादे से चलती-सी लगती। कालम का दिल धड़का।",
  "उसने कई पल देखा — रोशनी ने कभी उसकी तरफ नहीं आई। वह वहीं खड़ा रहा।",
  "हिम्मत जुटाकर आगे बढ़ा — पुआल में किसान मिस्टर फिंच मिले। वह पुरानी लालटेन झुलाते हुए बाड़ की जाँच कर रहे थे।",
  "'ठीक हो बेटे?' बुज़ुर्ग किसान ने पूछा — उन्हें ज़रा भी अंदाज़ा नहीं था कि जंगल से वह कितने डरावने लग रहे थे। कालम ने तय किया — अब से देर हो तो लंबा रास्ता ही सही।"
],
'locked-music-room': [
  "हॉल के आखिर में एक दरवाज़ा था जो नाना कभी नहीं खोलते थे। जस्पर चार यात्राओं से उस दरवाज़े का रहस्य जानना चाहता था।",
  "चौथी यात्रा में वह दरवाज़ा खुला मिला — शायद भूलकर, शायद जानबूझकर। उसने धीरे से हैंडल घुमाया।",
  "कमरे में सैंतालीस छोटे-छोटे बेहद बारीक रेलवे मॉडल थे, छह चलते भाप के इंजन, तीन दीवारों पर हाथ से बनाई पहाड़ी दृश्यावली, और एक छोटी ट्रॉफी — 'बेस्ट इन शो, 1987।'",
  "नानी दरवाज़े में खड़ी थीं, हाथ में चाय। उन्हें बिल्कुल हैरानी नहीं थी। 'मुझे लगा यह नानी की तरह नहीं दिखता,' वह बोलीं।",
  "जस्पर ने पूरी तरह असहमति जताई। उन्होंने बाकी छुट्टी हर गाड़ी चलाते हुए बिताई।"
],
'cave-echoes-mystery': [
  "पुरानी खदान के पास घूमते हुए नौ साल की ज़ोई को पहाड़ी दरार से अपना ही नाम फुसफुसाते हुए सुनाई दिया।",
  "वह रुकी, ध्यान से सुना — फिर आया, थोड़ा साफ़। उसने एक छोटा कंकड़ दरार की ओर फेंका।",
  "एक मीठी-सी प्रतिध्वनि लौटी। उसे एहसास हुआ — यह एक गुफा है।",
  "अंदर झाँका — गुफा चम्मच के आकार की थी, घुमावदार। हवा उसमें से गुज़रती और प्रतिध्वनि के साथ मिलकर ऐसा बनाती जैसे कोई बोल रहा हो।",
  "ज़ोई ने उस शाम साइंस नोटबुक में तीन पन्ने भरे। वह डरी नहीं थी — बल्कि बहुत उत्साहित थी।"
],
'disappearing-portrait': [
  "किराए के नए घर में सीढ़ियों पर एक गंभीर बूढ़े सज्जन का चित्र था। इला को लगता था कि उनकी आँखें उसका पीछा करती हैं।",
  "बड़े भाई ने हँसाया — 'तस्वीर की आँखें नहीं चल सकतीं।' पर इला ने देखा, भाई खुद तस्वीर से नज़र मिलाने से कतराता था।",
  "एक शाम इला तस्वीर के सामने खड़ी होकर इधर-उधर सरकती रही — ध्यान से देखा।",
  "पाया — यह 'फॉलोइंग आईज़' तकनीक है जिसमें आँखें सीधी बाहर देखती हैं और किसी भी कोण से वे देखती लगती हैं। लाइब्रेरी में पढ़कर इसे समझा।",
  "इला ने तस्वीर का नाम 'जेराल्ड' रख दिया — और उसके बाद जेराल्ड डरावना नहीं, जाना-पहचाना लगने लगा।"
],
'tapping-window-branch': [
  "हर तेज़ हवा वाली रात आठ साल की नूर को उसके कमरे की खिड़की पर एक नियमित टक-टक-टक सुनाई देती।",
  "वह कभी-कभी रजाई में मुँह छुपा लेती — हर बार कल्पनाएँ करती कि बाहर कोई है।",
  "एक रात हिम्मत जुटाकर टॉर्च लेकर खिड़की के पास गई।",
  "बाहर पुराने नीम की एक पतली डाल हवा में झूलते हुए बार-बार खिड़की के शीशे से लग रही थी।",
  "नूर हल्के से मुस्कुराई और वापस बिस्तर पर चली गई। उस रात के बाद वह टक-टक को भूतिया नहीं बल्कि अपनी खुद की रात की लोरी समझने लगी।"
],
'old-photo-album': [
  "कमरे की अलमारी में एक पुराना फोटो एलबम था जिसमें अजनबी चेहरे थे। वेन ने जब भी उसे दोबारा देखा, कुछ बदला हुआ लगा।",
  "खाली कुर्सी पर कोई खड़ा, जहाँ पहले मुस्कान नहीं थी वहाँ मुस्कान। वेन रात को अलमारी की तरफ पीठ करके सोने लगी।",
  "आखिर हिम्मत करके नानी से पूछा।",
  "नानी ने हँसते हुए बताया — एलबम उनकी दादी की थीं जो बहुत कुशल फोटोग्राफर थीं। उन्होंने कई तस्वीरें एक-दूसरे के ऊपर छापकर एक अनोखी 'लेयर्ड' कला बनाई थी।",
  "वेन ने राहत महसूस की और एक नई प्रशंसा — 'भूत' नहीं थे, बस एक सृजनशील परदादी की पुरानी फोटोग्राफी की कला थी।"
],

// ── रहस्य की कहानियाँ (SUSPENSE) ──────────────────────────────────────────
'missing-cookies': [
  "हर शुक्रवार नानी बारह चॉकलेट कुकीज़ बनाकर खिड़की की चौखट पर ठंडा होने रखती थीं। इस शुक्रवार वापस आई तो सिर्फ सात बची थीं।",
  "'कोई मेरी कुकीज़ चुरा रहा है,' नानी ने सबकी ओर संदेह से देखते हुए कहा। माया ने तय किया — वह खुद इस रहस्य को सुलझाएगी।",
  "तीन सुराग मिले — खिड़की पर छोटे-छोटे पंजों के निशान, तोटों पर हल्की-सी खुरचन, और हर शाम गुलाब की झाड़ियों के पीछे से कुछ सरसराहट।",
  "एक रात माया टॉर्च लेकर बगीचे में छुप गई। एक मोटा रैकून आया और बड़ी सफाई से एक कुकी उठाकर भागा।",
  "माया को गुस्सा नहीं आया — हँसी आई। उसने नानी को राज़ बताया। नानी मान गईं — अब हर हफ्ते एक अतिरिक्त कुकी बगीचे में बाहर रखी जाती है।"
],
'locked-diary': [
  "नानी की अलमारी में एक पुरानी डायरी मिली — ऊपर लिखा था 'बाद में' और एक पीतल का छोटा ताला लगा था।",
  "प्रिया ने पूरी अलमारी खंगाली। चाबी नहीं मिली — सिर्फ एक पुरानी तस्वीर, नानी युवा थीं, एक बड़े बरगद के पास खड़ी।",
  "धीरे-धीरे तीन सुराग मिले — एक ढीली फर्शी टाइल के नीचे पीतल की चाबी, तस्वीर के पीछे एक पहेली, और उसी बरगद की छाल में एक निशान।",
  "पहेली सुलझाते हुए प्रिया बगीचे में गई और मिट्टी खोदी — एक देवदार का डिब्बा, मोम से बंद।",
  "डायरी खुली — डरावने रहस्य नहीं थे, नानी ने आने वाली पीढ़ियों के लिए प्रेम भरे पत्र लिखे थे। एक पत्र सीधे प्रिया को था।"
],
'footprints-snow': [
  "पहली बर्फ के बाद सुबह कबीर ने बगीचे की दीवार से लेकर अपनी खिड़की तक एक अजीब पाँव के निशानों की लकीर देखी।",
  "बहुत छोटे थे, किसी जाने-पहचाने जानवर से मेल नहीं खाते थे — लंबे उँगलियों के निशान और निशानों के बीच एक खिंची हुई रेखा।",
  "कबीर ने नोटबुक निकाली और निशान बनाए, फिर उन्हें पीछे की ओर खोजते-खोजते चलने लगा।",
  "निशान एक बड़े देवदार पेड़ के नीचे जाकर खत्म हुए — वहाँ एक पेंग्विन के आकार का हवा निकला हुआ गुब्बारा पड़ा था, जो स्कूल के मेले से उड़ा था, और उसकी धागा बर्फ पर लकीर खींचती रही।",
  "कबीर ज़ोर से हँसा और गुब्बारा उठाया। उस दिन की सबसे अजीब, मज़ेदार सुबह की याद रखी।"
],
'empty-classroom': [
  "लंचबॉक्स भूलकर वापस आए विक्रम को खाली कक्षा में अपनी सीट पर एक मुड़ा हुआ पर्चा मिला — उस पर उसका नाम था।",
  "खोला — 'शुक्रवार से पहले पढ़ाई के कोने का गलीचा उठाकर देखो।' अजीब हस्तलिपि।",
  "दो दिन वह ध्यान से देखता रहा — उस दोपहर कौन रुका था।",
  "गुरुवार को उसने गलीचा उठाया — एक छोटा-सा लिपटा हुआ उपहार और एक और पर्चा।",
  "विक्रम ने पता लगाने की कोशिश की पर कभी जान नहीं पाया। इस रहस्य ने उसे सिखाया — कुछ अच्छे रहस्य सुलझाने के लिए नहीं, सराहने के लिए होते हैं।"
],
'missing-class-pet': [
  "सोमवार सुबह क्लास 4बी में हड़कंप — उनका हैम्स्टर पेबल्स पिंजरे से गायब था।",
  "नौ साल की क्विन ने खुद को मुख्य जाँचकर्ता घोषित किया और सबसे पहले जगह को ध्यान से देखा।",
  "तीन सुराग — स्टोर रूम की तरफ दाँतों के छोटे-छोटे निशान, पढ़ाई के कोने की बड़ी सीट से सरसराहट, और मछली बेपरवाह तैर रही थी।",
  "बड़ी बीनबैग के नीचे झाँका — पेबल्स खुश होकर बैठा था, टिशू पेपर और रूई से घोंसला बना चुका था।",
  "क्लास ने राहत की साँस ली। पेबल्स वापस गया, ताला लगा। क्विन को 'क्लास की मुख्य जासूस' का खिताब मिला।"
],
'coded-message-park': [
  "पार्क की एक बेंच के नीचे फ़ारह को एक कागज़ मिला — उस पर सिर्फ़ अजीब निशान थे, कोई अक्षर नहीं।",
  "घर लाकर उसने लाइब्रेरी की कोड-किताब से मिलाया। देर तक कोशिश के बाद एक संदेश उभरा।",
  "संदेश था — 'पुराने पीपल की छाया में, फव्वारे के पास, तीन कदम उत्तर, ढीले पत्थर के नीचे।'",
  "अगले दिन फ़ारह पार्क पहुँची, फव्वारे के पास पीपल खोजा, तीन कदम गई, ढीला पत्थर उठाया — एक छोटा टिन।",
  "अंदर लिखा था — 'पड़ोस के खजाना-खेल का सुराग नंबर 4।' फ़ारह ने बाकी सुराग भी खोजे, इनाम जीता — और अपना एक नया सुराग टिन में रखकर फिर दबा दिया।"
],
'strange-key-attic': [
  "परदादी की अटारी साफ करते हुए सियेना को एक पुराने डिब्बे में एक छोटी पीतल की चाबी मिली — कोई ताला नहीं।",
  "पूरे घर में हर बंद दरवाज़ा, हर दराज़, हर संदूक खोलने की कोशिश की — कहीं फिट नहीं हुई।",
  "परदादी ने हँसते हुए बताया — यह उनके पिता की पुरानी लिखाई-मेज़ की चाबी थी। मेज़ एक नीलामी में बिक गई थी।",
  "सियेना ने हार नहीं मानी। उस नीलाम सामान की दुकान पर पहुँची और खोजते-खोजते एक मेज़ मिली।",
  "चाबी ने एक छुपी दराज़ खोली — अंदर परदादी-परदादा के प्रेम-पत्रों का बंडल था। सियेना को खजाना मिल गया था — पैसे का नहीं, कहानियों का।"
],
'backyard-paw-prints': [
  "एक सुबह सात साल के ओमर को पिछवाड़े में बड़े-बड़े अनजाने पंजों के निशान मिले — पड़ोस के कुत्ते से बड़े, लंबे नाखूनों के साथ।",
  "उसने तुरंत नोटबुक निकाली और निशान उतारे। जाँच शुरू हुई।",
  "सुराग मिले — बाड़ पर मोटे धूसर बाल, खाद के ढेर के पास ताज़ी खुदाई।",
  "बड़े भाई ने लाइब्रेरी से वन्यजीव पहचान की किताब लाई। ओमर के चित्र से मिलान हुआ — रैकून।",
  "रैकून उनके खाद के डिब्बे से आकर्षित था। परिवार ने 'रैकून-प्रूफ' ढक्कन खरीदा। ओमर को अपनी पहली जाँच का नतीजा मिल गया था।"
],
'whisper-in-hallway': [
  "कक्षा के बाद अकेले काम करते ग्यारह साल के दियेगो को गलियारे से धीमी-धीमी फुसफुसाहट सुनाई दी।",
  "खिड़की से झाँका — खाली लॉकर, मद्धिम रोशनी। आवाज़ कहीं और थी।",
  "हल्के कदमों से चलकर वह स्टोर रूम के पास पहुँचा, कान लगाया।",
  "दो आवाज़ें थीं — प्रिया और सैम, जो आने वाले टैलेंट शो के लिए छुपकर अभ्यास कर रहे थे। शर्म आती थी।",
  "दियेगो ने दरवाज़ा थपथपाया। अगले एक घंटे तीनों ने साथ मिलकर अभ्यास किया। एक डरावना रहस्य तीन दोस्तों का कारण बन गया।"
],
'numbered-envelopes': [
  "निहारिका के दसवें जन्मदिन की सुबह उसके कमरे में पाँच बंद लिफाफे मिले — हर एक पर एक नंबर और एक पहेली।",
  "पहले लिफाफे ने रसोई के कुकी जार की ओर इशारा किया, दूसरा 'जहाँ किताबें सोती हैं' का सुराग देता था।",
  "तीसरा फ्रिज के पीछे, चौथा बगीचे के कमरे में।",
  "पाँचवें लिफाफे के साथ लाल रिबन में लिपटी एक नई साइकिल थी — और पीछे से 'सरप्राइज़!' की आवाज़।",
  "निहारिका को समझ आया — माँ-पापा ने एक साधारण जन्मदिन की सुबह को खज़ाने की सबसे खूबसूरत खोज में बदल दिया था।"
],
'silent-piano-keys': [
  "अकेली बैठकर होमवर्क करती युकी को दूसरे कमरे से पियानो की आवाज़ आई — वही धुन जो वह हफ्ते भर से सीख रही थी।",
  "अंदर कोई नहीं था — पर चाबियाँ खुद-ब-खुद बज रही थीं।",
  "हिम्मत से अंदर गई। कोई बेंच पर नहीं था — पर आवाज़ आ रही थी।",
  "पास जाकर देखा — पियानो के 'ऑटो-प्ले' का स्विच ऑन था। उनका तोता मोची उस पर बैठकर उसे दबा गया था।",
  "युकी हँसते हुए मोची को उठाया। उस दिन से वह स्विच बंद ही रखती है — वैसे, सब कहते हैं मोची का संगीत-चयन काफी अच्छा है।"
],
'vanishing-paintings': [
  "हर सोमवार कक्षा की दीवार से एक चित्र गायब हो जाता — आर्ट टीचर मिस्टर अल्वारेज़ परेशान थे।",
  "बारह साल की डानी ने जाँच शुरू की — खाली हुक, खिड़की पर नीले रंग का धब्बा।",
  "रंग के धब्बे गलियारे से एक स्टोर रूम तक जाते थे। वहाँ गायब चित्र और एक घबराया हुआ छोटा बच्चा थियो।",
  "थियो ने रंग मिलाना सीखना था पर पूछने में शर्म आती थी।",
  "मिस्टर अल्वारेज़ को गुस्सा नहीं आया। उन्होंने थियो को आर्ट क्लब में बुलाया। रहस्य सुलझा, एक नई दोस्ती मिली।"
],
'midnight-library-light': [
  "देर रात लाइब्रेरी की ऊपरी खिड़की में एक बत्ती जलती दिखती — जबकि इमारत बंद होनी चाहिए थी।",
  "ऐडन ने दो दिन यह देखा — ठीक नौ बजे रोशनी, दस बजे गुल।",
  "चौथी रात रात्रि-प्रहरी मिस्टर पेत्रोव से सीधे पूछा।",
  "बूढ़े प्रहरी ने बताया — सेवानिवृत्त पुरानी लाइब्रेरियन रोज़ आकर अपनी पसंदीदा किताबें पढ़ती हैं। यह उनका छोटा-सा राज़ था।",
  "ऐडन ने किसी को नहीं बताया। हर शाम वह रोशनी देखकर मुस्कुराता — कहानियों से कभी न टूटने वाला प्यार।"
],
'blueprint-in-bottle': [
  "नानी के बगीचे के शेड की सफाई करते हुए रोज़ा को फर्श के नीचे एक बंद बोतल मिली — अंदर तीस साल पुरानी हस्तलिखित चिट्ठी।",
  "चिट्ठी पर लिखा था — 'जो भी यह पाए उसे' — और इसी संपत्ति में एक लकड़ी के डिब्बे का पता बताया।",
  "रोज़ा ने पूरा वीकेंड नापते-नापते खुदाई की — पहले गलत जगह, फिर सही।",
  "सब्ज़ी की क्यारी के एक कोने में कुदाल किसी चीज़ से टकराई — देवदार का डिब्बा, मोम से सीलबंद।",
  "अंदर खूबसूरत पौधों के हाथ से बने चित्र और एक पर्चा — 'प्यार से बनाए। कोई इन्हें सराहे।' रोज़ा ने हर एक को फ्रेम करवाया।"
],
'switched-lunchboxes': [
  "सोमवार को कैम ने अपना लंचबॉक्स खोला — अंदर उसका खाना नहीं था। स्मोक्ड सैल्मन, हम्मस और एक खूबसूरत लिखावट का पर्चा — 'अच्छा खाओ, तेज़ रहो।'",
  "किसी का लंच बदल गया था। कैम ने जाँच शुरू की।",
  "दोपहर भोजन में हर साथी से नाश्ते के बारे में पूछा — किसका डिब्बा नीला था?",
  "शाम तक पीछे की पंक्ति में शांत और साफ-सुथरी अमेलिया मिली — नानी ने प्यार से पर्चे लिखे थे।",
  "दोनों ने डिब्बे बदले। बाद के हफ्तों में पता चला — दोनों में कमाल की समानताएँ हैं।"
],
'grandmothers-hidden-room': [
  "नानी के रसोईघर के पास एक दरवाज़ा था जो कभी नहीं खुलता था। जस्पर चार यात्राओं में उसके बारे में सोचता रहा।",
  "चौथी यात्रा में दरवाज़ा खुला मिला — शायद अनजाने, शायद जानबूझकर।",
  "अंदर सैंतालीस नन्हे-नन्हे रेलवे मॉडल, चलते हुए भाप के इंजन, हाथ से बना पहाड़ी दृश्य और एक ट्रॉफी — '1987 बेस्ट इन शो।'",
  "नानी दरवाज़े पर चाय लेकर खड़ी थीं, बिल्कुल हैरान नहीं। 'मुझे नहीं लगा यह नानियों वाला शौक है।'",
  "जस्पर ने पूरी असहमति जताई। उन्होंने बाकी छुट्टी हर गाड़ी चलाते हुए बिताई।"
],
'missing-page-book': [
  "उसी किताब को तीसरी बार लाइब्रेरी से लेती विला ने देखा — सैंतालीसवाँ पृष्ठ गायब था, सबसे ज़रूरी जगह से।",
  "छियालीसवें पृष्ठ के हाशिये में नीली स्याही से लिखा था — 'जवाब यहाँ है, अगर तुम्हें पता हो गायब पन्ना कहाँ गया।'",
  "लाइब्रेरी रिकॉर्ड देखे — आठ सालों में ग्यारह लोगों ने किताब ली। चार जाने-पहचाने थे।",
  "तीसरे व्यक्ति — रिटायर्ड शिक्षक मिस्टर बोवेन — ने धीरे-धीरे मान लिया। एक उद्धरण नोट करने के लिए पृष्ठ निकाला था, भूल गए थे।",
  "उन्होंने तुरंत पन्ना दिया। विला लाइब्रेरी लौटी — पर पहले वह जवाब पढ़ गई। सफर सार्थक था।"
],
'treasure-map-bakery': [
  "अपनी पसंदीदा बेकरी में मेनू का पिछला हिस्सा पलटते हुए डानी को हाथ से बना शहर का नक्शा मिला — बीच में एक X।",
  "बेकर ने बताया — उसने नहीं बनाया, रहस्य था। डानी सीधे पार्क पहुँची।",
  "X की जगह पुराने बरगद के नीचे एक टाइल उठाई — एक छोटा डिब्बा।",
  "अंदर लिखा था 'सुराग नंबर 4' — पड़ोस की ऐतिहासिक सोसाइटी का खज़ाना-खेल।",
  "डानी ने सातों सुराग खोजे और इनाम जीता — उसी बेकरी से साल भर के दालचीनी रोल। अब हर बार मेनू का पिछला हिस्सा ज़रूर देखती है।"
],
'moving-garden-gnomes': [
  "दो हफ्तों से हामिद देख रहा था कि पड़ोसिन मिसेज़ ओकोंजो के बगीचे की पाँच गनोम मूर्तियाँ हर सुबह थोड़ी बदली हुई होती हैं।",
  "उसने हर सुबह फोटो लिया — पैटर्न बदल रहा था।",
  "हामिद फोटो लेकर मिसेज़ ओकोंजो के पास गया।",
  "वे हँसकर बोलीं — उनकी सात साल की नातिन रोज़ शाम आकर गनोम के लिए एक काल्पनिक कहानी बनाती है और उनकी जगह बदल देती है। अभी वे किसी जटिल कूटनीतिक बातचीत में हैं।",
  "हामिद ने पूरी कहानी सुनी। उस दिन वह अकेला था जिसने उस रहस्य की खूबसूरती को समझा।"
],
'broken-clock-tower': [
  "शहर का पुराना घड़ियाल टॉवर एक मंगलवार सुबह चुप हो गया — सालों की नियमितता एकदम टूट गई।",
  "बारह साल की अनिका ने तय किया — तीन दिन में उत्सव से पहले रहस्य सुलझाना है।",
  "चपरासी की अनुमति से अंदर जाकर पुराने गियरों को ध्यान से देखा।",
  "एक महत्वपूर्ण गियर में एक पक्षी का घोंसला फँसा था — अंडे सुरक्षित थे।",
  "अनिका ने घोंसले को पास की मुँडेर पर सावधानी से रखा और घड़ी दोबारा चालू कराई। उत्सव पर घंटी फिर बजी — और पक्षी-परिवार को सबसे आगे की सीट मिली।"
],

// ── साहसिक कहानियाँ (ACTION) ──────────────────────────────────────────────
'treehouse-rescue': [
  "किरण और उसकी बहन तारा का ट्रीहाउस पूरे मोहल्ले में मशहूर था। एक तूफ़ानी दोपहर रस्सी की सीढ़ी टूट गई — दोनों ऊपर फँस गए।",
  "नीचे तारा की ज़रूरी दवाई का बैग था, और काले बादल तेज़ी से आ रहे थे।",
  "किरण ने पास में रखी पुरानी बागीचे की नली देखी और एक उपाय सोचा।",
  "नली को रेलिंग से बाँधा, दो बार गाँठ जाँची, और तारा को पहले धीरे-धीरे नीचे उतरने दिया।",
  "पहली बूँदें गिरने से पहले दोनों सुरक्षित नीचे थे। पापा ने किरण की तारीफ की — मुसीबत में दिमाग़ चला तो हल निकलता है।"
],
'river-rapids': [
  "कैंपिंग ट्रिप में ज़ारा और देव ने छोटी नाव से नदी उतरने का फैसला किया। एक मोड़ पर अचानक तेज़ धाराएँ सामने आ गईं।",
  "'वापस नहीं जा सकते!' देव ने चिल्लाया, नाव एक लहर में हिचकोला खाई।",
  "ज़ारा ने हिम्मत बटोरी, देव के निर्देश माने — 'बाएँ! अब दाएँ! वह डाल के नीचे से!'",
  "एक बड़ी लहर ने नाव को लगभग पलट दिया, पर ज़ारा ने समय पर चप्पू मारा।",
  "शांत पानी में पहुँचते ही दोनों ने राहत की साँस ली — भींगे, थके, पर विजयी। मन में था — एक बार और करना है।"
],
'rooftop-kite': [
  "अमन की नई लाल अजगर-पतंग एक तेज़ झोंके में उड़कर सामने की इमारत की छत पर जा गिरी।",
  "इमारत के चौकीदार से इजाज़त लेकर अमन फायर एस्केप की सीढ़ियाँ चढ़ा — जल्दी करने का वादा किया।",
  "छत पर पहुँचते-पहुँचते हवा और तेज़ हो गई। एंटेना में उलझी पतंग तेज़ हवा में फड़फड़ा रही थी।",
  "रेलिंग पकड़कर एक हाथ से धीरे-धीरे धागा सुलझाया।",
  "पतंग आई — एक झोंके ने छीनना चाहा पर अमन ने कसकर पकड़ लिया। वापस उतरा — खुश। तय किया — अगली बार ऐसी जगह उड़ाएगा जहाँ कोई छत न हो।"
],
'lost-puppy-storm': [
  "नयना के पिल्ले बस्टर ने एक तितली के पीछे भागकर गेट खोल लिया — सीधे मुख्य सड़क की तरफ। आसमान में काले बादल छा रहे थे।",
  "'बस्टर, रुको!' चिल्लाती नयना भागी, पोखरों में छपछपाती।",
  "एक पार्क में झाड़ियों में पूँछ दिखी। नयना काँटेदार झाड़ियों में घुस गई, हाथ खरोंच गए।",
  "बेंच के नीचे बस्टर भीगा, काँपता, ऊपर देख रहा था। नयना ने उसे झट से उठाया।",
  "एक साथ दौड़े — घर पहुँचे, भीगे, पर हँसते हुए। नयना ने तय किया — बस्टर के गले का पट्टा अब कभी नहीं उतरेगा।"
],
'mountain-bike-chase': [
  "साहिल जंगल के रास्ते पर तेज़ पैडल मारता हुआ अपने भाई की साइकिल टीम को पकड़ने की कोशिश कर रहा था।",
  "पेड़ की जड़ें और पत्थर नीचे भागते रहे। एक मोड़ पर अचानक गिरी हुई डाल रास्ता रोके हुए थी — ब्रेक लगाने की जगह नहीं थी।",
  "सुबह भाई ने जो सिखाया था वह याद आया। अगले पहिये को ज़रा ऊँचा किया।",
  "डाल पार हुई, साइकिल लड़खड़ाई पर गिरी नहीं।",
  "टीम के पास पहुँचा तो भाई ने मुस्कुराकर सिर हिलाया। 'पहले जंगल रेस के लिए बुरा नहीं,' उसने कहा।"
],
'beach-rescue-flag': [
  "रेत का किला बनाती तारा ने लाइफगार्ड का लाल झंडा देखा — खतरनाक धाराएँ।",
  "तभी देखा — एक छोटा लड़का किनारे से दूर खिंचता जा रहा था।",
  "तारा दौड़ती हुई लाइफगार्ड टॉवर की ओर गई, दोनों हाथ हिलाकर चिल्लाई।",
  "लाइफगार्ड ने देखा, रेस्क्यू बोय उठाया और लहरों में कूद पड़ा। लड़के को सुरक्षित किनारे ले आया।",
  "लाइफगार्ड ने बाद में तारा को धन्यवाद दिया — 'तुम्हारी तेज़ी और चौकसी से आज एक जान बची।'"
],
'tree-house-fire-drill': [
  "ट्रीहाउस में ताश खेलते माया और लियो को धुएँ की गंध आई। नीचे सूखी घास में आग जल रही थी।",
  "दोनों को नाना की सिखाई बातें याद आईं। लियो ने दरवाज़े के पास टँगी सीटी उठाई और तीन बार ज़ोर से बजाई। माया ने पानी के जग में दो तौलिए भिगोए।",
  "आग से दूर वाली सीढ़ी से सावधानी से, पर जल्दी से उतरे।",
  "नाना भाग कर आए, आग बुझाने वाला यंत्र लिए।",
  "नाना ने बच्चों की तारीफ की — 'मुश्किल में भी दिमाग़ ठंडा रखा।' शाम को कैंपफायर के पास बैठकर सब साथ में मुस्कुराए।"
],
'soccer-storm-sprint': [
  "चैंपियनशिप मैच की आखिरी दो मिनटें बाकी थीं, स्कोर बराबर। काले बादल तेज़ी से आ रहे थे — बिजली दिखी तो खेल बंद होगा।",
  "प्रिया ने गेंद थामी और दौड़ी — दो खिलाड़ियों के बीच से, ऊपर से गरज।",
  "टीम के साथियों ने चिल्लाया। हवा ने चोटी उड़ाई।",
  "गोलकीपर निकला। प्रिया ने पल भर में फैसला लिया — गेंद हल्के से ऊपर उछाली।",
  "रेफरी की सीटी बजी जब गेंद नेट में थी। भीगते हुए टीम ने जश्न मनाया — आखिरी पलों में जीत मिली।"
],
'kayak-rapids-teamwork': [
  "नादिया और थियो की पहली कयाकिंग ट्रिप में वे तेज़ धाराओं के पास पहुँच गए।",
  "'साथ चप्पू मारो, एक-दूसरे के खिलाफ नहीं!' थियो ने चिल्लाया, कयाक एक लहर में लड़खड़ाई।",
  "नादिया ने लय बनाई — 'बाएँ, दाएँ, बाएँ!' एक बड़े पत्थर के पास से निकले।",
  "एक भँवर ने कयाक को किनारे धकेला — दोनों ने मिलकर पैडल मारे।",
  "शांत पानी में पहुँचकर दोनों ने पैडल हवा में उठाए। कोच ने कहा — 'असली टीमवर्क दिखा।'"
],
'wildfire-evacuation-pets': [
  "दूर पहाड़ियों पर धुआँ उठता देख ओनेज़ और माटियो ने एक पल में समझ लिया — बकरियाँ और मुर्गियाँ निकालनी होंगी।",
  "माँ-पापा कागज़ात सँभालने लगे। बच्चे सीधे अस्तबल पहुँचे। मिलकर सब जानवरों को पिंजरों में बंद किया।",
  "धुआँ नज़दीक आता जा रहा था। माटियो ने ज़िद्दी मुर्गा पकड़ा, ओनेज़ ने पसंदीदा खाने से बकरियों को बुलाया।",
  "सायरन की आवाज़ आई — आखिरी पिंजरा ट्रक में रखा।",
  "सुरक्षित जगह पर पहुँचकर देखा — सभी जानवर सुरक्षित थे। पापा ने गर्व से कहा — 'इन दोनों ने परिवार के सारे जानवर बचाए।'"
],
'skateboard-hill-save': [
  "मेपल हिल पर स्केटबोर्ड अभ्यास करते जेलेन ने देखा — बहन का ट्रॉली ढलान पर बढ़ती जा रही है, सीधे सड़क की ओर।",
  "बिना सोचे जेलेन ने स्केटबोर्ड पर धक्का मारा और ट्रॉली के पीछे दौड़ा।",
  "हवा उड़ती रही, एक कार के पास से निकला, आँखें ट्रॉली पर।",
  "आखिरी पल में ट्रॉली का हैंडल थाम लिया और दोनों को फुटपाथ पर मोड़ दिया।",
  "बहन की पसंदीदा खिलौना बच गई। बहन ने कसकर गले लगाया। माँ-पापा ने कहा — 'आज तुम रात के खाने के बाद मिठाई दोनों के हक की खाओगे।'"
],
'cave-flashlight-rescue': [
  "इको केव के मुहाने पर खेलते हुए तारिक का छोटा कज़िन बहुत अंदर चला गया और डरकर रोने लगा।",
  "तारिक ने पापा की टॉर्च ली और धीरे-धीरे अंदर बढ़ा, कज़िन को आवाज़ देकर शांत करता रहा।",
  "सुरंग तंग थी, झुककर चलना पड़ा। टॉर्च की रोशनी में गीली चट्टानें चमकीं।",
  "एक मोड़ पर कज़िन दिखा — एक पत्थर के सहारे बैठा, चेहरे पर धूल और आँसू।",
  "तारिक ने उसका हाथ थामा और वापस रास्ता ढूँढते हुए बाहर आए। माँ-पापा ने दोनों को गले लगाया। पापा ने तय किया — अब सबको हेडलैंप।"
],
'kite-festival-storm-dash': [
  "पतंग उत्सव में मेई नाना की पुरानी अजगर-पतंग उड़ा रही थी। अचानक काले बादल तेज़ी से आ गए।",
  "मेई ने जल्दी से धागा लपेटना शुरू किया। एक ज़ोरदार झोंका आया और धागे का गोला लगभग हाथ से छूट गया।",
  "उसने पाँव ज़मीन में गड़ाए और सब ताकत से धागा खींचती रही।",
  "आखिरी हिस्सा लपेटा — पतंग भागती हुई उसके हाथों में आई, पहली बूँदें गिरीं।",
  "शामियाने की ओर भागी। नाना ने गर्व से देखा — 'असली पतंगबाज़ अपनी पतंग हर मौसम में सँभालना जानता है।'"
],
'subway-lost-ticket': [
  "स्कूल ट्रिप के बाद यूसुफ का टिकट खो गया और अपना ग्रुप भी। स्टेशन पर चार मिनट में आखिरी ट्रेन जाने वाली थी।",
  "भीड़ में से रास्ता बनाते हुए भागा, भारी बैग पीठ पर उछलता रहा।",
  "प्लेटफॉर्म छह पर टीचर की पीली छाता दिखी।",
  "आखिरी घोषणा हुई — यूसुफ ने पूरी ताकत से दौड़ा, टीचर ने दरवाज़ा थामे रखा।",
  "साँस फूलते हुए बैठा। टीचर ने राहत की साँस ली, फिर मुस्कुराई — 'आज से टिकट ज़िप वाली जेब में।'"
],
'night-hike-compass-break': [
  "माउंटेन कैंपिंग की दूसरी रात मिस्टर ओसेई का पाँव मुड़ा। दो किलोमीटर जंगल में, अँधेरा, और मुख्य कंपास टूटा।",
  "प्रिया को एक वर्कशॉप याद आई — साफ आसमान में ध्रुव तारा दिशा बताता है। उसने 'W' आकार का तारा-समूह खोजा।",
  "'यह उत्तर है,' उसने कहा। 'कैंप दक्षिण-पूर्व में है — उस तरफ।'",
  "जूनो ने ज़मीन देखी, प्रिया ने तारों से दिशा बताई। छोटे बच्चों ने घायल मिस्टर ओसेई को सहारा दिया।",
  "डेढ़ घंटे बाद कैंप की रोशनी दिखी। मिस्टर ओसेई ने अँधेरे में तालियाँ बजाईं — प्रिया के लिए अब तक की सबसे बड़ी तारीफ।"
],
'runaway-painting-cart': [
  "स्कूल के आर्ट डे में ढलान पर खड़ी पेंट की गाड़ी धीरे-धीरे चलने लगी — सीधे छोटे बच्चों की ओर।",
  "तेरह साल की मिया ने बिना सोचे गाड़ी के साथ-साथ दौड़ी, सही कोण नापती हुई।",
  "दोनों हाथों से फ्रेम थामी। वज़न और गति के धक्के से उसके हाथ काँपे पर उसने रोक दिया।",
  "गाड़ी ढलान के आड़े रुक गई — बच्चों से दो कदम पहले।",
  "आर्ट टीचर ने आकर कहा — 'ठीक है। इस बार पहिये का ब्रेक लगाना याद रखेंगे।' मिया को बस इतना ही काफी था।"
],
'last-minute-science-fix': [
  "साइंस फेयर के दिन आदित्य का प्रोजेक्ट बोर्ड रात को टपकती छत के पानी में भीग गया था। जजों के आने में पैंतालीस मिनट।",
  "तेज़ी से आकलन किया — नोट्स बर्बाद, पर असली प्रयोग — छह गमले — बिल्कुल ठीक।",
  "पड़ोसी से मार्कर माँगा, एक कार्डबोर्ड पर तीन हफ्तों का डेटा दिमाग़ से बनाया।",
  "चार्ट लगाया, गमले सामने रखे — जज आने से पहले तैयार।",
  "दूसरा इनाम मिला। जज ने कहा — 'सजीव प्रयोग और दबाव में शानदार प्रदर्शन।' बाद में जब उसने असली कहानी बताई, जज और भी चकित हो गए।"
],
'building-collapse-escape': [
  "ग्रीष्मकालीन कॉटेज में पापा के साथ पुरानी दीवार ठीक करते हुए बारह साल की नादिया को एक गहरी दरारने की आवाज़ आई।",
  "'पापा! हटो!' वह चिल्लाई और दोनों हाथों से पापा की बाँह खींची। दीवार उसी पल धम्म से उसी जगह गिरी।",
  "धूल बैठी। पापा घास पर बैठे थे, गिरे पत्थरों को देखते — फिर नादिया को।",
  "नादिया ने बाद में देखा — उसके हाथ काँप रहे थे। पर उन पलों में सिर्फ एक ही ख्याल था — पापा हटें।",
  "उस शाम पापा ने फोन पर कहानी बताई — हर बार थोड़ी और नाटकीय। नादिया ने नहीं रोका।"
],
'puppy-flood-rescue': [
  "तीन दिन की बारिश के बाद नाला बहुत बढ़ गया था। दस साल की एलेना ने पड़ोस के बीगल पिल्ले को कीचड़ के टापू पर फँसा और काँपता देखा।",
  "माँ मदद बुला रही थी, पर पानी चढ़ रहा था। एलेना दौड़कर बगीचे से लंबा तख्ता ले आई।",
  "तख्ता भारी था, पर खींचकर टापू तक एक सिरा पहुँचाया, फिर चार हाथ-पाँव के सहारे रेंगती हुई आगे बढ़ी।",
  "तख्ता झुका, ठंडा पानी हाथों पर छपाछप आया। पर वह रुकी नहीं — पिल्ले का पट्टा थामा और वापस रेंगी।",
  "माँ ने दोनों को तौलिए में लपेटा। बाद में एलेना को समझाया भी — पर पहले गले लगाया।"
],
'trapped-in-elevator': [
  "शहर की लाइब्रेरी में लिफ्ट तीसरी और चौथी मंजिल के बीच रुक गई। ग्यारह साल की किट के साथ दो छोटे बच्चे थे।",
  "बच्चे रोने लगे। किट ने एक गहरी साँस ली — किसी को तो शांत रहना होगा। लिफ्ट का पैनल देखा।",
  "इमरजेंसी बटन तीन बार दबाया, इंटरकॉम से आवाज़ आई। स्पष्ट बोली — 'तीन लोग फँसे हैं, सब ठीक हैं, मदद भेजो।'",
  "इंतज़ार में बच्चों के साथ ताली खेल शुरू किया। बीस मिनट बाद दरवाज़े खुले।",
  "लाइब्रेरियन ने किट को 'शांत और समझदार व्यवहार के लिए' प्रशस्ति-पत्र दिया। किट ने उसे दीवार पर लगाया — और चुपचाप सीढ़ियों को और पसंद करने लगी।"
],

// ── प्रेरणादायक कहानियाँ (INSPIRATIONAL) ──────────────────────────────────
'smallest-sapling': [
  "एक विशाल जंगल में सौ साल पुराने पेड़ गर्व से खड़े थे। उन सबके बीच एक छोटा-सा पौधा था — शायद खरगोश जितना ऊँचा — जो उनके बड़े-बड़े पत्तों की छाँव में रोशनी खोजता रहता था।",
  "'तुम हमारे जितने कभी नहीं उगोगे,' बड़े पेड़ हवा में फुसफुसाते। 'देर से आए हो, मिट्टी भी सख्त है।' पौधा निराश होता, पर हर सुबह अपने छोटे-छोटे पत्ते जितनी रोशनी मिले उस तरफ फैलाता।",
  "साल बीते। एक भयानक तूफ़ान आया। जिन बड़े पेड़ों की जड़ें उथली थीं वे उखड़ गए।",
  "तूफ़ान के बाद छोटा पौधा — अब एक छोटा पेड़ — अडिग खड़ा था। ऊपर बढ़ना मुश्किल था, इसलिए उसने नीचे — उस पथरीली मिट्टी में — गहरी जड़ें जमाई थीं।",
  "बचे पेड़ों ने उसे नई नज़र से देखा। 'तुम टिके कैसे?' उन्होंने पूछा। 'ऊपर तेज़ नहीं उग सका, इसलिए अंदर गहरा उगा,' पेड़ ने शांति से कहा। धीमी शुरुआत कभी-कभी सबसे मज़बूत नींव होती है।"
],
'clumsy-potter': [
  "एक छोटे गाँव में ईशान नाम का युवक कुम्हार बनना चाहता था। पर उसकी पहली मिट्टी की बर्तन टेढ़ी, टूटी, और चाक पर बिखर जाती थी।",
  "पड़ोसी खिड़की में रखी टेढ़ी बर्तनें देखकर मुस्कुराते। ईशान शर्मिंदा होता, पर हर सुबह चाक के पास बैठ जाता।",
  "दिन महीनों में बदले। ध्यान दिए बिना, उसके हाथ सधने लगे — बर्तनें गोल, चिकनी होने लगीं।",
  "एक साल बाद एक यात्री व्यापारी ने खिड़की में एक खूबसूरत नीली सुराही देखी। 'यह किसने बनाया?' वह मुग्ध होकर बोला।",
  "ईशान हैरान था — जो हाथ एक समय टेढ़ी बर्तनें बनाते थे, वे खामोशी से, धैर्य से कुछ सुंदर बनाना सीख गए थे। हुनर कुछ लोगों को जन्म से नहीं मिलता — यह उन लोगों का इनाम है जो कभी हार नहीं मानते।"
],
'kite-without-wind': [
  "एक खिलौने की दुकान में एक चमकीली पीली पतंग एक कील पर टँगी रहती थी। हर रोज़ वह ऊँचे उड़ने का सपना देखती।",
  "दिन शांत और हवा-रहित रहे। दूसरी पतंगें खरीदी गईं और खुशी से आसमान में उड़ीं। पीली पतंग भूली-बिसरी-सी रह गई।",
  "'मेरे लिए हवा कब आएगी?' वह सोचती।",
  "एक सुबह काले बादल घिरे और एक तेज़ हवा दरवाज़ा खोलकर आई। एक लड़का दौड़ा और पीली पतंग खरीद ली।",
  "पलों में वह पतंग उड़ रही थी — सोच से भी ज़्यादा ऊँची। उसे समझ आया — वह इंतज़ार बेकार नहीं था। सही हवा के लिए जब तक रुकी, तब तक मन ही मन तैयार होती रही।"
],
'cracked-violin': [
  "दस साल की लीला का वायलिन हाथ से छूटकर टूट गया। लगा संगीत ख़त्म हो गया — नया खरीदने की कुव्वत नहीं थी।",
  "नाना — रिटायर्ड बढ़ई — ने वायलिन ध्यान से देखा और कहा — 'एक हफ्ता दो।'",
  "हर शाम शेड से रगड़ने, थपथपाने की आवाज़ें आती थीं — लीला को अंदर नहीं जाने दिया।",
  "सातवें दिन नाना ने बुलाया। मेज़ पर वायलिन था — दरार लगभग दिखती नहीं थी।",
  "लीला ने धनुष उठाया और बजाया। मरम्मत हुई वायलिन पहले से ज़्यादा मीठा गाया। उसने सीखा — टूटी चीज़ें अगर प्यार और धैर्य से जोड़ी जाएँ तो पहले से ज़्यादा सुंदर हो सकती हैं।"
],
'gardener-rocky-soil': [
  "जब मिस्टर अबारा को पिता की ज़मीन विरासत में मिली तो पड़ोसी किसान धीरे-धीरे बोले — 'इस पथरीली ज़मीन में कुछ नहीं होता।' पर मिस्टर अबारा ने बस मुस्कुराकर एक-एक पत्थर उठाना शुरू किया।",
  "साल-दर-साल पड़ोसी देखते रहे — 'बेकार मेहनत है।'",
  "पर मिस्टर अबारा हर मौसम खाद डालते, ध्यान से सींचते, खेत पर भरोसा रखते।",
  "मिट्टी धीरे-धीरे नरम और उपजाऊ होती गई।",
  "पाँचवें साल उनका खेत खिल उठा — जहाँ कभी सिर्फ पत्थर थे, वहाँ सबसे लहलहाती फसल थी। पड़ोसियों को अब समझ आया — धैर्य और यकीन के आगे कोई मिट्टी बेकार नहीं।"
],
'paper-boat-river-journey': [
  "तिया नाम की लड़की ने एक कागज़ी नाव बनाई और एक चौड़ी नदी में छोड़ दी। नाव छोटी थी, धाराएँ तेज़।",
  "'मैं कहीं पहुँचने से पहले डूब जाऊँगी,' नाव ने मन में सोचा, लहरों में डगमगाते हुए।",
  "पर हर पत्थर, हर मोड़ के सामने वह थोड़ी झुकती, थोड़ी मुड़ती और आगे निकल जाती।",
  "दिन बीते — शांत जंगलों से, भरे-पूरे शहरों से, खुले मैदानों से नाव गुज़रती रही।",
  "आखिर वह समुद्र में पहुँची — एक विशाल खुले आसमान के नीचे। उसे समझ आया — एक छोटी शुरुआत, एक-एक कदम, दुनिया की सबसे बड़ी यात्रा करा सकती है।"
],
'boy-who-built-bird-houses': [
  "नौ साल के एली ने देखा — हर साल उसके मोहल्ले में चिड़ियाँ कम होती जा रही हैं। उसने सोचा — मैं घोंसले बनाऊँगा।",
  "पहला घोंसला एक हफ्ते में टूट गया। बड़े भाई ने हँसाया — 'एक घोंसले से क्या होगा?'",
  "एली ने हार नहीं मानी। नाना से बढ़ईगिरी सीखी, हर वीकेंड अभ्यास किया।",
  "दो साल में पार्कों, बगीचों, गलियों में एक-एक करके घोंसले लगते गए।",
  "ग्यारहवें जन्मदिन पर पड़ोसियों ने देखा — सुबह फिर चिड़ियों की चहचहाहट सुनाई देती है, सालों बाद। किसी ने गिना — एली ने ठीक सौ घोंसले बनाए थे।"
],
'girl-who-learned-braille': [
  "जब कक्षा में नई सहपाठी सूमी आई — लाठी से चलती, उँगलियों से पढ़ती — दस साल की प्रियंका दूर से उत्सुकता से देखती रही।",
  "करीब जाकर उसने सीधे पूछा — 'क्या तुम मुझे थोड़ा ब्रेल सिखाओगी?' सूमी को सच्ची रुचि देखकर खुशी हुई।",
  "ब्रेल सीखना उससे कहीं ज़्यादा मुश्किल था जितना लगा था। उँगलियाँ धीमी, धब्बे सब एक जैसे लगते।",
  "हफ्तों की मेहनत के बाद, सूमी के उत्साह से, प्रियंका ने धीरे-धीरे छूकर पढ़ना शुरू किया।",
  "साल के अंत तक दोनों पक्की सहेलियाँ बन गई थीं। प्रियंका ने सीखा — दूसरे की दुनिया में क़दम रखने से एक नई दोस्ती और एक नई ताकत दोनों मिलती हैं।"
],
'lighthouse-keeper-patience': [
  "पचास साल तक कैप्टन रेयेस हर शाम दीपस्तंभ की सीढ़ियाँ चढ़ते और बड़ी बत्ती जलाते — जहाज़ों को खतरनाक पत्थरों से बचाने के लिए।",
  "ज़्यादातर रातें कोई जहाज़ नहीं दिखता। आने वाले लोग पूछते — 'इस अकेले, दोहराव भरे काम में क्या मतलब है?' कैप्टन जवाब देते — 'मतलब उस एक जहाज़ में है जिसे किसी तूफ़ानी रात मेरी रोशनी की ज़रूरत होगी।'",
  "एक सर्दी की रात कोहरे में एक छोटी मछुआरों की नाव रास्ता भटक गई। दूर से कैप्टन की अटल रोशनी दिखी।",
  "मछुआरे सुरक्षित किनारे पहुँचे और पूरे गाँव को बताया — कैप्टन की रोशनी ने उन्हें बचाया।",
  "कैप्टन ने कभी डींग नहीं मारी। अगली शाम फिर सीढ़ियाँ चढ़े। चुपचाप, विश्वास के साथ किया गया काम — जब कोई नहीं देख रहा तब भी — सबसे ज़रूरी होता है।"
],
'recycled-violin-girl': [
  "एक रात अमारा ने एक घुमंतू संगीतकार को वायलिन बजाते सुना। वह आवाज़ उसके दिल में उतर गई — पर परिवार के पास नया वायलिन खरीदने के पैसे नहीं थे।",
  "उसने पुराना तेल का डिब्बा, लकड़ी के टुकड़े और टूटी साइकिल की तारें इकट्ठी कीं।",
  "नाना — एक कुशल कारीगर — ने उसके हाथों को मार्गदर्शन दिया। रातों को लालटेन की रोशनी में दोनों काम करते।",
  "तैयार वाद्य देखने में अजीब था, पर जब अमारा ने तार छेड़े तो एक साफ, मीठी आवाज़ निकली।",
  "एक घूमते संगीत-शिक्षक ने उसे सुना और असली वायलिन सीखने का इंतज़ाम किया। अमारा नहीं भूली — उसका पहला संगीत पैसों से नहीं, धैर्य, पुराने सामान और एक भरोसेमंद नाना से मिला था।"
],
'the-smallest-librarian': [
  "गाँव की छोटी लाइब्रेरी में किताबें बेतरतीब थीं। तीन परिवारों ने आना बंद कर दिया था — कोई किताब ढूँढ नहीं पाता।",
  "आठ साल की प्रीति ने तय किया — गर्मियों की छुट्टी में वह खुद से व्यवस्था करेगी। उसने अपना रंगीन पट्टियों का सिस्टम बनाया।",
  "हर सुबह जल्दी आती, किताबें सँभालती, कार्डबोर्ड के टुकड़ों से हाथ से लिखे बोर्ड बनाती।",
  "लाइब्रेरियन ने नई व्यवस्था देखकर दो बार चक्कर लगाया और कहा — 'तुम्हारे पैदा होने से पहले जो थी उससे बेहतर है यह।'",
  "अगले महीने तीनों परिवार वापस आए। प्रीति को समझ आया — एक उपयोगी काम में छोटा-सा सुधार भी बड़ा बदलाव ला सकता है।"
],
'one-hundred-dumplings': [
  "नानी चेन साठ सालों से हर सप्ताहांत एक-एक करके, उसी सधी हुई गति से, उसी सावधानी से, कभी सौ से कम नहीं — मोमो बनाती थीं।",
  "नाती-नातिन पूछते — 'इतनी मेहनत क्यों? दुकान से ले आते।' नानी मुस्कुराकर कहतीं — 'दुकान के मोमो में साठ साल नहीं होते।'",
  "वह बात समझने में सालों लगे। वह रेसिपी नहीं सिखा रही थीं — वह दस हज़ार बार की कोशिशें, खुद की नानी से सीखी बातें, हाथों की अपनी भाषा सिखा रही थीं।",
  "जब बड़ी नातिन विश्वविद्यालय जाने वाली थी तो नानी ने एक पूरा सप्ताहांत उसे सिखाया। अंत में बोलीं — 'अब तुम्हारे हाथों में भी कुछ साल आ गए।'",
  "नातिन ने दो साल अटकते-अटकते बनाए, चालीस साल बेजोड़। अपने नाती-नातिन को कहा — कुछ चीज़ें अंदर से ही, धीरे-धीरे ही सीखी जाती हैं।"
],
'library-card-first': [
  "छठे जन्मदिन पर अमारा की माँ उसे सार्वजनिक पुस्तकालय ले गई और उसे अपना पहला लाइब्रेरी कार्ड मिला — जिस पर उसका पूरा नाम छपा था।",
  "उसने चालीस मिनट तक किताब चुनने में लगाए। पहला कार्ड था — पहली चुनावाला।",
  "आखिर उसने एक नदी पर कागज़ी नाव तैराने वाली लड़की की किताब चुनी। चित्र में छोटी-सी लड़की, बड़ा पानी, विशाल आसमान — उसका दिल भर आया।",
  "किताब लौटाने से पहले उसने चौदह बार पढ़ी और अगले साल दो बार दोबारा माँगी।",
  "तीस साल बाद भी वह कार्ड एक डिब्बे में बंद है। उस कार्ड ने उसका नाम बताया — वह किस्से पढ़ने वाली है। उससे अच्छा परिचय उसे कभी नहीं मिला।"
],
'boy-who-learned-cooking': [
  "जब माँ की कमर में चोट लगी और वे महीनों चूल्हे पर खड़ी नहीं हो सकती थीं, दस साल के मार्को ने बिना कुछ कहे तय किया — खाना बनाना सीखूँगा।",
  "पहले तीन कोशिशें सीख के रूप में थीं — पास्ता बर्तन से चिपका, सूप में नमक ज़्यादा, चावल अजीब हुए।",
