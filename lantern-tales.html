<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lantern Tales — Bedtime Stories & Words</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..700&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --night-deep:#171534;
    --night-mid:#221f4a;
    --plum:#332a5e;
    --parchment:#f6ecd8;
    --parchment-edge:#e9d9b8;
    --gold:#e3b15e;
    --gold-soft:#f1cf8f;
    --cream:#f4efe6;
    --ink:#2a2440;
    --coral:#e3876a;
    --mist:rgba(244,239,230,0.55);
    --radius:18px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(circle at 18% 8%, rgba(241,207,143,0.16), transparent 45%),
      radial-gradient(circle at 85% 75%, rgba(227,135,106,0.10), transparent 50%),
      linear-gradient(180deg, var(--night-deep) 0%, var(--night-mid) 55%, var(--plum) 100%);
    font-family:'Quicksand', sans-serif;
    color:var(--cream);
    -webkit-font-smoothing:antialiased;
  }
  .stars{position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden;}
  .star{position:absolute; width:3px; height:3px; background:var(--gold-soft); border-radius:50%; opacity:0.5; animation:twinkle 4s ease-in-out infinite;}
  @keyframes twinkle{0%,100%{opacity:0.15;}50%{opacity:0.85;}}
  @media (prefers-reduced-motion: reduce){ .star{animation:none; opacity:0.4;} }

  .wrap{position:relative; z-index:1; max-width:760px; margin:0 auto; padding:36px 22px 70px;}

  .hero{text-align:center; margin-bottom:34px;}
  .moon{
    width:64px; height:64px; margin:0 auto 14px; border-radius:50%;
    background: radial-gradient(circle at 35% 35%, var(--gold-soft), var(--gold) 60%, #c98f3f 100%);
    box-shadow:0 0 30px 6px rgba(227,177,94,0.45), 0 0 70px 18px rgba(227,177,94,0.12);
  }
  h1{
    font-family:'Fraunces', serif; font-weight:600; font-size:2.3rem; margin:0 0 6px;
    letter-spacing:0.01em;
  }
  .tagline{color:var(--mist); font-size:0.98rem; margin:0; font-weight:500;}

  .lanterns{
    display:grid; grid-template-columns:repeat(3, 1fr); gap:12px; margin-bottom:30px;
  }
  @media (max-width:520px){ .lanterns{grid-template-columns:repeat(2,1fr);} }
  .lantern{
    background:rgba(244,239,230,0.06);
    border:1px solid rgba(244,239,230,0.16);
    border-radius:14px; padding:16px 10px;
    text-align:center; cursor:pointer;
    transition:transform 0.18s ease, background 0.18s ease, border-color 0.18s ease;
    font-family:'Quicksand', sans-serif; font-weight:600; color:var(--cream);
  }
  .lantern .emoji{display:block; font-size:1.6rem; margin-bottom:6px;}
  .lantern:hover{transform:translateY(-3px); background:rgba(244,239,230,0.12);}
  .lantern.active{
    background:linear-gradient(160deg, rgba(227,177,94,0.28), rgba(227,177,94,0.10));
    border-color:var(--gold-soft);
    box-shadow:0 0 22px rgba(227,177,94,0.25);
  }

  .shelf-label{
    font-family:'Fraunces', serif; font-size:1.1rem; color:var(--gold-soft);
    margin:0 0 14px; text-align:center; font-weight:500;
  }

  .shelf{display:grid; gap:14px;}
  .book{
    background:linear-gradient(160deg, rgba(244,239,230,0.08), rgba(244,239,230,0.03));
    border:1px solid rgba(244,239,230,0.14);
    border-radius:14px; padding:16px 18px; cursor:pointer;
    display:flex; align-items:center; gap:14px;
    transition:background 0.18s ease, transform 0.18s ease;
  }
  .book:hover{background:rgba(244,239,230,0.13); transform:translateX(3px);}
  .book .ic{font-size:1.7rem;}
  .book .meta{flex:1;}
  .book .b-title{font-family:'Fraunces', serif; font-size:1.12rem; margin:0 0 3px; color:var(--cream);}
  .book .b-sub{font-size:0.8rem; color:var(--mist); margin:0;}
  .book .arrow{color:var(--gold-soft); font-size:1.1rem;}

  /* Story reading view */
  .page-overlay{
    position:fixed; inset:0; z-index:5; background:rgba(20,18,40,0.55);
    display:flex; align-items:flex-start; justify-content:center;
    padding:30px 16px; overflow-y:auto;
    backdrop-filter: blur(2px);
  }
  .page{
    background:linear-gradient(170deg, var(--parchment), var(--parchment-edge));
    color:var(--ink); border-radius:var(--radius);
    max-width:600px; width:100%; padding:32px 28px 28px;
    box-shadow:0 20px 60px rgba(0,0,0,0.4);
    position:relative;
  }
  .close-btn{
    position:absolute; top:16px; right:18px; background:none; border:none;
    font-size:1.3rem; color:var(--ink); opacity:0.55; cursor:pointer; line-height:1;
  }
  .close-btn:hover{opacity:1;}
  .page-cat{
    font-family:'Quicksand'; font-weight:700; font-size:0.72rem; letter-spacing:0.12em;
    text-transform:uppercase; color:var(--coral); margin:0 0 8px;
  }
  .page h2{font-family:'Fraunces', serif; font-size:1.55rem; margin:0 0 4px; font-weight:600;}
  .page .age{font-size:0.82rem; color:#7a6f55; margin:0 0 20px;}

  .audio-controls{
    display:flex; align-items:center; gap:10px; margin-bottom:18px;
    background:rgba(42,36,64,0.06); border-radius:12px; padding:10px 14px;
  }
  .audio-btn{
    border:none; background:var(--coral); color:#fff; border-radius:50%;
    width:38px; height:38px; font-size:1rem; cursor:pointer; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
  }
  .audio-btn:hover{filter:brightness(1.08);}
  .audio-btn.secondary{background:rgba(42,36,64,0.18); color:var(--ink);}
  .audio-status{font-size:0.82rem; color:#7a6f55; font-weight:600;}
  .speed-select{
    margin-left:auto; font-size:0.78rem; border-radius:8px; border:1px solid rgba(42,36,64,0.2);
    padding:5px 7px; background:#fff; color:var(--ink); font-family:'Quicksand';
  }

  .story-text{font-size:1.04rem; line-height:1.8; font-family:'Fraunces', serif; font-weight:400;}
  .story-text p{margin:0 0 14px;}
  .w{padding:0 1px; border-radius:3px; transition:background 0.12s ease;}
  .wordhit{
    background:rgba(227,135,106,0.22); border-bottom:2px dotted var(--coral);
    cursor:pointer; font-weight:600;
  }
  .wordhit:hover{background:rgba(227,135,106,0.38);}
  .w.speaking{background:var(--gold-soft); box-shadow:0 0 0 2px var(--gold-soft);}

  .vocab-panel{
    margin-top:24px; padding-top:18px; border-top:1px solid rgba(42,36,64,0.15);
  }
  .vocab-panel h3{
    font-family:'Quicksand'; font-size:0.78rem; letter-spacing:0.1em; text-transform:uppercase;
    color:#7a6f55; margin:0 0 12px; font-weight:700;
  }
  .vocab-list{display:flex; flex-direction:column; gap:10px;}
  .vocab-item{
    background:rgba(42,36,64,0.05); border-radius:10px; padding:10px 14px;
  }
  .vocab-word{font-family:'Quicksand'; font-weight:700; color:var(--ink); font-size:0.95rem;}
  .vocab-mean{font-size:0.88rem; color:#544a3e; margin:3px 0 0;}

  .footer-note{
    text-align:center; color:var(--mist); font-size:0.78rem; margin-top:40px; line-height:1.6;
  }

  .back-link{
    display:inline-block; margin-bottom:18px; color:var(--gold-soft); font-size:0.85rem;
    cursor:pointer; font-weight:600; background:none; border:none; padding:0;
  }
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="wrap">
  <div class="hero">
    <div class="moon"></div>
    <h1>Lantern Tales</h1>
    <p class="tagline">Pick a feeling. Light a lantern. Hear a story — and learn a few new words along the way.</p>
  </div>

  <div class="lanterns" id="lanterns"></div>

  <div id="bookView">
    <p class="shelf-label" id="shelfLabel">Choose a lantern above to see its story</p>
    <div class="shelf" id="shelf"></div>
  </div>

  <p class="footer-note">Tap any <span class="wordhit" style="cursor:default;">underlined word</span> inside a story to learn what it means.</p>
</div>

<div id="overlay"></div>

<script>
const CATEGORIES = [
  {id:'moral', label:'Moral', emoji:'🪔'},
  {id:'funny', label:'Funny', emoji:'😄'},
  {id:'scary', label:'Scary', emoji:'👻'},
  {id:'suspense', label:'Suspense', emoji:'🔍'},
  {id:'action', label:'Action', emoji:'🚀'},
  {id:'inspirational', label:'Inspiring', emoji:'🌱'},
];

const STORIES = [
  {
    id:'honest-woodcutter', category:'moral', age:'Ages 5–8',
    title:'The Woodcutter\'s Golden Axe',
    paragraphs:[
      "Long ago, in a village beside a quiet river, there lived a woodcutter named Ravi. Every morning, he walked into the forest with his old axe to chop wood, and every evening, he sold the wood to feed his family.",
      "One day, while cutting a branch near the riverbank, Ravi's axe slipped from his hands and fell into the deep water with a splash. He sat down on a rock, feeling utterly miserable, for that axe was the only tool he owned.",
      "Suddenly, the river began to shimmer, and a kind spirit rose from the water. \"Why are you so sad?\" she asked gently. Ravi explained, and the spirit dove into the river, returning with a magnificent golden axe. \"Is this yours?\" she asked.",
      "Ravi shook his head. \"No, mine was plain and old.\" The spirit smiled and dove again, this time bringing up a silver axe. Again, Ravi said it was not his. Impressed by his honesty, the spirit dove a third time and brought up his own simple, rusty axe.",
      "\"This one is mine,\" Ravi said happily. The river spirit was so moved by his truthfulness that she gave him all three axes as a reward. From that day on, Ravi never had to worry about food again — and he always told the truth, even when no one was watching."
    ],
    vocab:[
      {word:'miserable', meaning:'feeling very unhappy or sad', example:'Losing his only tool made him feel miserable.'},
      {word:'shimmer', meaning:'to shine with a soft, trembling light', example:'The lake began to shimmer in the moonlight.'},
      {word:'magnificent', meaning:'extremely beautiful or impressive', example:'The golden axe looked magnificent in the sunlight.'},
      {word:'honesty', meaning:'the quality of telling the truth', example:'Her honesty surprised everyone in the room.'},
      {word:'reward', meaning:'something given for good behavior', example:'He received a reward for returning the lost wallet.'}
    ]
  },
  {
    id:'sneezing-dragon', category:'funny', age:'Ages 4–7',
    title:'The Dragon Who Couldn\'t Stop Sneezing',
    paragraphs:[
      "In the Whistling Mountains lived a young dragon named Pepper, who had one very unusual problem: every time he got excited, he sneezed fire — and he got excited about almost everything.",
      "One morning, a butterfly landed on his nose. \"Oh, how pretty!\" Pepper gasped — and ACHOO! A burst of flame shot out, turning a nearby bush into instant toast. The butterfly fluttered away, looking rather offended.",
      "At lunch, Pepper smelled his favorite soup. \"Mmm, mushroom!\" ACHOO! The soup bowl flew off the table and landed on the village scarecrow, who was unfortunately wearing his best hat that day.",
      "The other dragons started keeping their distance, which made Pepper feel quite lonely. So he visited Granny Ember, the oldest and wisest dragon in the mountains. \"The trick,\" she chuckled, \"is not to stop the excitement — it's to sneeze into your wing!\"",
      "Pepper practiced all afternoon. The next time a rainbow appeared and he felt the tickle building up, he quickly tucked his snout into his wing — ACHOO! — and only a small, polite puff of smoke came out. From then on, Pepper became famous for being the most excitable, and most polite, dragon in the mountains."
    ],
    vocab:[
      {word:'unusual', meaning:'not common or normal', example:'It is unusual to see snow in summer.'},
      {word:'gasped', meaning:'took a quick, sharp breath in surprise', example:'She gasped when she saw the surprise party.'},
      {word:'offended', meaning:'feeling hurt or annoyed by something', example:'He looked offended when his joke wasn\'t funny.'},
      {word:'distance', meaning:'the space between two things or people', example:'The cat kept its distance from the loud dog.'},
      {word:'tickle', meaning:'a light, itchy feeling that makes you want to laugh or sneeze', example:'A tickle in her nose meant a sneeze was coming.'}
    ]
  },
  {
    id:'friendly-ghost', category:'scary', age:'Ages 7–10',
    title:'The Gentle Ghost of Maple House',
    paragraphs:[
      "When the Patel family moved into the old house on Maple Street, their daughter Asha heard strange noises every night — soft footsteps, a creaking door, and once, a quiet hum drifting down the hallway.",
      "Most children would have hidden under their blankets, but Asha was curious, not frightened. One night, she tiptoed out of bed and followed the gentle humming sound to the attic, where a faint, silvery light flickered.",
      "There, sitting by an old rocking chair, was the see-through shape of an elderly woman. Asha's heart pounded, but the figure simply looked up and smiled. \"Oh, hello dear. I didn't mean to wake you. I'm Mrs. Whitfield — I used to live here.\"",
      "It turned out Mrs. Whitfield had simply never left the house she loved so much, and she'd been humming her favorite old lullabies out of habit. She was lonely, not dangerous, and she'd been too shy to introduce herself properly.",
      "From then on, Asha would sit in the attic some evenings, listening to Mrs. Whitfield's stories about the old days. The footsteps and humming never scared her again — because the scariest things, she learned, are sometimes just lonely things waiting to be understood."
    ],
    vocab:[
      {word:'flickered', meaning:'shone with a light that quickly changed between bright and dim', example:'The candle flickered in the breeze.'},
      {word:'elderly', meaning:'old, especially referring to a person', example:'The elderly man walked slowly with his cane.'},
      {word:'pounded', meaning:'beat very hard and fast', example:'Her heart pounded before the big race.'},
      {word:'habit', meaning:'something a person does often, almost without thinking', example:'Brushing his teeth before bed was a habit.'},
      {word:'lonely', meaning:'feeling sad because you are alone', example:'The new student felt lonely on his first day.'}
    ]
  },
  {
    id:'missing-cookies', category:'suspense', age:'Ages 6–9',
    title:'The Mystery of the Missing Cookies',
    paragraphs:[
      "Every Friday, Grandma baked exactly twelve chocolate cookies and placed them on the kitchen windowsill to cool. But this Friday, when she returned from watering her plants, only seven cookies remained.",
      "\"Someone is sneaking my cookies,\" Grandma announced at dinner, eyeing everyone suspiciously. Maya, her granddaughter, decided she would solve this mystery herself. She gathered three clues: a trail of tiny crumbs leading toward the garden, a faint paw print on the windowsill, and a suspicious rustling sound coming from behind the rose bushes every evening.",
      "That night, Maya hid behind the garden shed with a flashlight, determined to catch the cookie thief red-handed. She waited patiently as the sun set and the crickets began to chirp. Just as she was about to give up, she heard a rustle.",
      "Slowly, a small, fluffy raccoon emerged from the bushes, crept up to the windowsill, and carefully lifted a cookie with its clever little paws. Maya gasped — not in anger, but in delight. The thief was a clever little visitor, not a person at all!",
      "Maya named the raccoon Bandit and convinced Grandma to bake one extra cookie each week, just for him, leaving it safely in the garden instead of the windowsill. The mystery was solved, and Maya had made an unexpected new friend."
    ],
    vocab:[
      {word:'suspiciously', meaning:'in a way that shows distrust or doubt', example:'She looked at the open jar suspiciously.'},
      {word:'clues', meaning:'pieces of information that help solve a mystery', example:'The detective found three important clues.'},
      {word:'rustling', meaning:'a soft, dry sound like leaves moving', example:'They heard rustling in the bushes nearby.'},
      {word:'determined', meaning:'having made a firm decision to do something', example:'She was determined to finish the race.'},
      {word:'unexpected', meaning:'surprising; not thought to happen', example:'The unexpected guest arrived early.'}
    ]
  },
  {
    id:'treehouse-rescue', category:'action', age:'Ages 6–9',
    title:'The Great Treehouse Rescue',
    paragraphs:[
      "Kiran and his little sister Tara had built the best treehouse in the whole neighborhood, complete with a rope ladder, a flag, and a lookout window. One windy afternoon, while playing inside, they heard a loud CRACK from below.",
      "A storm had loosened the old rope ladder, and it had snapped clean in half! Worse still, dark clouds were rolling in fast, and their backpack with Tara's inhaler was still sitting at the bottom of the tree.",
      "\"Don't worry,\" Kiran said, trying to sound braver than he felt. \"We built this treehouse — we can figure this way down too.\" He spotted the old garden hose Dad had left coiled nearby and an idea sparked in his mind.",
      "Working quickly as the wind picked up, Kiran tied the sturdy hose to the treehouse railing, testing the knot twice the way his scout leader had taught him. He lowered it carefully, then helped Tara climb down first, holding the hose steady with all his strength.",
      "Just as the first raindrops fell, both children landed safely on the ground and dashed inside, grabbing the inhaler along the way. That night, over hot cocoa, Dad praised Kiran's quick thinking — and the next weekend, they built an even sturdier ladder, just in case adventure came calling again."
    ],
    vocab:[
      {word:'loosened', meaning:'became less tight or secure', example:'The screw had loosened over time.'},
      {word:'sturdy', meaning:'strong and solidly built', example:'The sturdy table held all the heavy books.'},
      {word:'coiled', meaning:'wound into a circular shape', example:'The snake coiled itself around the branch.'},
      {word:'praised', meaning:'expressed approval or admiration', example:'The coach praised the team for trying hard.'},
      {word:'adventure', meaning:'an exciting or unusual experience', example:'Climbing the mountain was a great adventure.'}
    ]
  },
  {
    id:'smallest-sapling', category:'inspirational', age:'Ages 5–9',
    title:'The Smallest Sapling',
    paragraphs:[
      "In a vast forest stood many tall, proud trees that had grown for a hundred years. Among them was the smallest sapling, barely taller than a rabbit, struggling to find sunlight beneath their enormous leaves.",
      "\"You'll never grow as tall as us,\" the older trees would whisper when the wind blew. \"You started too late, and the soil here is too rocky.\" The little sapling felt discouraged, but every morning, it still stretched its tiny leaves toward whatever light it could find.",
      "Years passed. A terrible storm swept through the forest, and several of the old, proud trees — tall but with shallow roots — were uprooted and fell. The little sapling, however, had spent all those quiet years growing its roots deep into the rocky soil, exactly because growing upward had been so difficult.",
      "When the storm cleared, the sapling remained standing, now a young tree with roots stronger than any other in the forest. The remaining trees looked at it with new respect. \"How did you survive?\" they asked.",
      "\"I couldn't grow fast,\" the tree replied gently, \"so I grew deep instead.\" Years later, that tree became the oldest and steadiest one in the whole forest — proof that what looks like a slow start can sometimes become the strongest beginning of all."
    ],
    vocab:[
      {word:'sapling', meaning:'a young, small tree', example:'The gardener planted a tiny sapling by the fence.'},
      {word:'enormous', meaning:'very large in size', example:'The enormous elephant walked slowly through the field.'},
      {word:'discouraged', meaning:'having lost confidence or hope', example:'He felt discouraged after losing the game.'},
      {word:'uprooted', meaning:'pulled out of the ground, roots and all', example:'The strong wind uprooted several small plants.'},
      {word:'steadiest', meaning:'most stable and unlikely to shake or fall', example:'It was the steadiest ladder in the shed.'}
    ]
  }
];

// Render stars
const starsEl = document.getElementById('stars');
for(let i=0;i<40;i++){
  const s = document.createElement('div');
  s.className='star';
  s.style.left = Math.random()*100+'%';
  s.style.top = Math.random()*100+'%';
  s.style.animationDelay = (Math.random()*4)+'s';
  starsEl.appendChild(s);
}

let activeCategory = null;

function renderLanterns(){
  const el = document.getElementById('lanterns');
  el.innerHTML = '';
  CATEGORIES.forEach(cat=>{
    const btn = document.createElement('div');
    btn.className = 'lantern' + (activeCategory===cat.id ? ' active':'');
    btn.innerHTML = `<span class="emoji">${cat.emoji}</span>${cat.label}`;
    btn.onclick = ()=>{ stopSpeech(); activeCategory = cat.id; renderLanterns(); renderShelf(); };
    el.appendChild(btn);
  });
}

function renderShelf(){
  const shelf = document.getElementById('shelf');
  const label = document.getElementById('shelfLabel');
  shelf.innerHTML = '';
  if(!activeCategory){
    label.textContent = 'Choose a lantern above to see its story';
    return;
  }
  const catMeta = CATEGORIES.find(c=>c.id===activeCategory);
  const stories = STORIES.filter(s=>s.category===activeCategory);
  label.textContent = `${catMeta.emoji} ${catMeta.label} stories`;
  stories.forEach(story=>{
    const card = document.createElement('div');
    card.className='book';
    card.innerHTML = `<span class="ic">📖</span>
      <div class="meta">
        <p class="b-title">${story.title}</p>
        <p class="b-sub">${story.age} · ${story.vocab.length} new words</p>
      </div>
      <span class="arrow">→</span>`;
    card.onclick = ()=> openStory(story);
    shelf.appendChild(card);
  });
}

// Splits a paragraph into word tokens (keeping punctuation attached to each word)
function tokenize(paragraph){
  return paragraph.split(/\s+/).filter(Boolean);
}

// Builds paragraph HTML where every word is its own clickable/highlightable span
function buildParagraphHtml(paragraph, vocab, paraIndex){
  const words = tokenize(paragraph);
  const vocabLower = vocab.map(v=>v.word.toLowerCase());
  const spans = words.map((w, i)=>{
    const cleanWord = w.replace(/[^a-zA-Z']/g, '');
    const isVocab = vocabLower.includes(cleanWord.toLowerCase());
    const cls = 'w' + (isVocab ? ' wordhit' : '');
    const dataWord = isVocab ? ` data-word="${cleanWord}"` : '';
    return `<span class="${cls}" data-p="${paraIndex}" data-i="${i}"${dataWord}>${w}</span>`;
  });
  return spans.join(' ');
}

let speechState = { utterances: [], paraOffsets: [], currentUtteranceIndex: 0, playing: false };

function stopSpeech(){
  window.speechSynthesis.cancel();
  document.querySelectorAll('.w.speaking').forEach(el=>el.classList.remove('speaking'));
  speechState.playing = false;
  const statusEl = document.getElementById('audioStatus');
  const playBtn = document.getElementById('playBtn');
  if(statusEl) statusEl.textContent = 'Ready to read aloud';
  if(playBtn) playBtn.textContent = '▶';
}

function speakStory(story){
  if(!('speechSynthesis' in window)){
    alert('Voice reading is not supported in this browser. Try Chrome or Edge.');
    return;
  }
  stopSpeech();
  const rateSelect = document.getElementById('speedSelect');
  const rate = rateSelect ? parseFloat(rateSelect.value) : 0.9;

  const utterances = story.paragraphs.map((p, pIdx)=>{
    const words = tokenize(p);
    const text = words.join(' ');
    const u = new SpeechSynthesisUtterance(text);
    u.rate = rate;
    u.pitch = 1.05;
    // Precompute cumulative character offsets for each word in this utterance's text
    const offsets = [];
    let pos = 0;
    words.forEach((w)=>{
      offsets.push(pos);
      pos += w.length + 1; // +1 for the space
    });
    u.onboundary = (event)=>{
      if(event.name !== 'word') return;
      // find the word index whose offset is closest to (but not exceeding) charIndex
      let idx = 0;
      for(let k=0;k<offsets.length;k++){ if(offsets[k] <= event.charIndex) idx = k; else break; }
      document.querySelectorAll('.w.speaking').forEach(el=>el.classList.remove('speaking'));
      const target = document.querySelector(`.w[data-p="${pIdx}"][data-i="${idx}"]`);
      if(target){
        target.classList.add('speaking');
        target.scrollIntoView({block:'nearest', behavior:'smooth'});
      }
    };
    u.onend = ()=>{
      document.querySelectorAll('.w.speaking').forEach(el=>el.classList.remove('speaking'));
      if(pIdx === story.paragraphs.length - 1){
        speechState.playing = false;
        const statusEl = document.getElementById('audioStatus');
        const playBtn = document.getElementById('playBtn');
        if(statusEl) statusEl.textContent = 'Finished — tap play to hear it again';
        if(playBtn) playBtn.textContent = '▶';
      }
    };
    return u;
  });

  speechState.utterances = utterances;
  speechState.playing = true;
  const statusEl = document.getElementById('audioStatus');
  const playBtn = document.getElementById('playBtn');
  if(statusEl) statusEl.textContent = 'Reading aloud…';
  if(playBtn) playBtn.textContent = '⏸';
  utterances.forEach(u=>window.speechSynthesis.speak(u));
}

function togglePlay(story){
  if(speechState.playing){
    if(window.speechSynthesis.speaking && !window.speechSynthesis.paused){
      window.speechSynthesis.pause();
      speechState.playing = false;
      document.getElementById('audioStatus').textContent = 'Paused';
      document.getElementById('playBtn').textContent = '▶';
    } else if(window.speechSynthesis.paused){
      window.speechSynthesis.resume();
      speechState.playing = true;
      document.getElementById('audioStatus').textContent = 'Reading aloud…';
      document.getElementById('playBtn').textContent = '⏸';
    }
  } else if(window.speechSynthesis.paused){
    window.speechSynthesis.resume();
    speechState.playing = true;
    document.getElementById('audioStatus').textContent = 'Reading aloud…';
    document.getElementById('playBtn').textContent = '⏸';
  } else {
    speakStory(story);
  }
}

function openStory(story){
  const overlay = document.getElementById('overlay');
  const catMeta = CATEGORIES.find(c=>c.id===story.category);
  const paraHtml = story.paragraphs.map((p, idx)=>`<p>${buildParagraphHtml(p, story.vocab, idx)}</p>`).join('');
  const vocabHtml = story.vocab.map(v=>`
    <div class="vocab-item">
      <div class="vocab-word">${v.word}</div>
      <div class="vocab-mean">${v.meaning}<br><em>"${v.example}"</em></div>
    </div>`).join('');

  overlay.innerHTML = `
    <div class="page-overlay" id="pageOverlay">
      <div class="page">
        <button class="close-btn" id="closeBtn">✕</button>
        <p class="page-cat">${catMeta.emoji} ${catMeta.label}</p>
        <h2>${story.title}</h2>
        <p class="age">${story.age}</p>
        <div class="audio-controls">
          <button class="audio-btn" id="playBtn">▶</button>
          <button class="audio-btn secondary" id="stopBtn">■</button>
          <span class="audio-status" id="audioStatus">Ready to read aloud</span>
          <select class="speed-select" id="speedSelect">
            <option value="0.7">Slow</option>
            <option value="0.9" selected>Normal</option>
            <option value="1.15">Fast</option>
          </select>
        </div>
        <div class="story-text">${paraHtml}</div>
        <div class="vocab-panel">
          <h3>New words in this story</h3>
          <div class="vocab-list">${vocabHtml}</div>
        </div>
      </div>
    </div>`;

  document.getElementById('closeBtn').onclick = ()=>{ stopSpeech(); overlay.innerHTML=''; };
  document.getElementById('pageOverlay').onclick = (e)=>{
    if(e.target.id==='pageOverlay'){ stopSpeech(); overlay.innerHTML=''; }
  };
  document.getElementById('playBtn').onclick = ()=> togglePlay(story);
  document.getElementById('stopBtn').onclick = ()=> stopSpeech();

  document.querySelectorAll('.wordhit').forEach(el=>{
    el.onclick = (e)=>{
      e.stopPropagation();
      const word = el.getAttribute('data-word');
      const v = story.vocab.find(x=>x.word.toLowerCase()===word.toLowerCase());
      if(v) alert(`${v.word}\n\n${v.meaning}\n\nExample: "${v.example}"`);
    };
  });
}

renderLanterns();
renderShelf();
</script>
